# ---------- Backend Defaults ----------
x-backend-defaults: &backend-defaults
  volumes:
    - stage_media_data:/app/media
    - stage_static_data:/app/staticfiles
  networks:
    - stage_network
  environment: &backend-defaults-env
    DEBUG: "False"
    DOCKER_ENV: "true"
    PYTHONPATH: "."
    SECRET_KEY: ${SECRET_KEY}
    DB_NAME: ${DB_NAME:-portfolio_stage}
    DB_USER: ${DB_USER}
    DB_PASSWORD: ${DB_PASSWORD}
    DB_HOST: db
    DB_PORT: 5432
    ADMIN_DOMAIN: ${ADMIN_DOMAIN}
    API_DOMAIN: ${API_DOMAIN}
    CSRF_COOKIE_DOMAIN: ${CSRF_COOKIE_DOMAIN}
    ALLOWED_HOSTS: ${ALLOWED_HOSTS}
    CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS}
    EMAIL_HOST: ${EMAIL_HOST}
    EMAIL_PORT: ${EMAIL_PORT}
    EMAIL_USE_TLS: ${EMAIL_USE_TLS}
    EMAIL_HOST_USER: ${EMAIL_HOST_USER}
    EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD}
    DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL}
    CONTACT_EMAIL: ${CONTACT_EMAIL}
    SESSION_COOKIE_DOMAIN: ${SESSION_COOKIE_DOMAIN}
    SENTRY_DSN: ${SENTRY_DSN:-}
    ENABLE_SENTRY: ${ENABLE_SENTRY:-false}
    ENVIRONMENT: ${ENVIRONMENT:-stage}
    SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.0}
    OPENAI_API_KEY: ${OPENAI_API_KEY}
    PROJECT_OWNER: ${PROJECT_OWNER:-Lukasz}
    REDIS_URL: redis://redis:6379/1
    CELERY_BROKER_URL: redis://redis:6379/0
    CELERY_RESULT_BACKEND: redis://redis:6379/0
    SKIP_PERMISSION_FIX: ${SKIP_PERMISSION_FIX:-false}
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_started

networks:
  stage_network:

services:
  # ---------- Database ----------
  db:
    image: postgres:18
    restart: always
    networks:
      - stage_network
    environment:
      POSTGRES_DB: ${DB_NAME:-portfolio_stage}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME:-portfolio_stage}"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - stage_postgres_data:/var/lib/postgresql/data

  # ---------- Redis ----------
  redis:
    image: portfolio-stage-redis:${TAG}
    restart: always
    networks:
      - stage_network
    ports:
      - "127.0.0.1:6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---------- Celery Worker ----------
  celery-worker:
    <<: *backend-defaults
    image: portfolio-stage-worker:${TAG}
    restart: always
    command: celery -A settings worker -l info -Q celery,monitoring --concurrency=2
    environment:
      <<: *backend-defaults-env
      MONITORING_LLM_PROVIDER: ${MONITORING_LLM_PROVIDER:-gpt}
    volumes:
      - stage_media_data:/app/media
      - stage_static_data:/app/staticfiles
      - ${DOCKER_LOGS_DIR:-/tmp/stage-docker-logs}:/app/docker-logs
    healthcheck:
      test: ["CMD-SHELL", "celery -A settings inspect ping -d celery@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---------- Celery Beat ----------
  celery-beat:
    <<: *backend-defaults
    image: portfolio-stage-backend:${TAG}
    restart: always
    command: celery -A settings beat -l info -s /app/celerybeat/celerybeat-schedule
    environment:
      <<: *backend-defaults-env
    volumes:
      - stage_media_data:/app/media
      - stage_static_data:/app/staticfiles
      - stage_celerybeat_data:/app/celerybeat

  # ---------- Frontend ----------
  fe:
    image: portfolio-stage-frontend:${TAG}
    restart: always
    networks:
      - stage_network
    environment:
      VITE_GA_TRACKING_ID: ${GA_TRACKING_ID:-}
      VITE_SENTRY_DSN_FE: ${SENTRY_DSN_FE:-}
      VITE_ENVIRONMENT: ${ENVIRONMENT:-stage}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
    volumes:
      - nginx_blocklist:/etc/nginx/blocklist:ro

  # ---------- Backend ----------
  be:
    <<: *backend-defaults
    image: portfolio-stage-backend:${TAG}
    restart: always

  # ---------- Release Job ----------
  release:
    <<: *backend-defaults
    image: portfolio-stage-backend:${TAG}
    restart: "no"
    command: >
      sh -c "
        python manage.py migrate --noinput &&
        python manage.py seed_settings &&
        python manage.py collectstatic --noinput
      "

  # ---------- Nginx ----------
  nginx:
    image: portfolio-stage-nginx:${TAG}
    restart: always
    networks:
      - stage_network
    depends_on:
      - be
      - fe
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN}
      NGINX_SSL_CERT: ${SSL_CERT_NAME}
      NGINX_SSL_KEY: ${SSL_KEY_NAME}
      FRONTEND_PORT: ${FRONTEND_PORT:-8080}
      ALLOWED_IP: ${ALLOWED_IP:-127.0.0.1}
      NGINX_ENVSUBST_OUTPUT_DIR: /etc/nginx
      NGINX_ENVSUBST_FILTER: "SITE_DOMAIN|NGINX_SSL_CERT|NGINX_SSL_KEY|FRONTEND_PORT|ALLOWED_IP"
    volumes:
      - ${NGINX_SSL_DIR:-./nginx/ssl/certs}:/etc/nginx/ssl:ro
      - ${NGINX_STAGE_LOG_DIR:-./nginx/logs/stage}:/var/log/nginx
      - stage_media_data:/app/media:ro
      - stage_static_data:/app/staticfiles:ro
      - nginx_blocklist:/etc/nginx/blocklist:ro
      - ./nginx/stage/restrictions.conf.template:/etc/nginx/templates/restrictions.conf.template:ro
    ports:
      - "8080:80"
      - "8443:443"

volumes:
  stage_postgres_data:
  stage_media_data:
  stage_static_data:
  stage_celerybeat_data:
  nginx_blocklist:
