name: portfolio-stage

# ---------- Backend Defaults ----------
x-backend-defaults: &backend-defaults
  volumes:
    - portfolio_staging_media_data:/app/media
    - portfolio_staging_static_data:/app/staticfiles
  networks:
    - stage_network
    - traefik_proxy
  environment: &backend-defaults-env
    DEBUG: "False"
    DOCKER_ENV: "true"
    PYTHONPATH: "."
    SECRET_KEY: ${SECRET_KEY}
    DB_NAME: portfolio_stage
    DB_USER: ${DB_USER:-portfolio}
    DB_PASSWORD: ${DB_PASSWORD}
    DB_HOST: db
    DB_PORT: 5432
    ADMIN_DOMAIN: ${ADMIN_DOMAIN}
    API_DOMAIN: ${API_DOMAIN}
    SITE_DOMAIN: ${SITE_DOMAIN}
    CSRF_COOKIE_DOMAIN: ${CSRF_COOKIE_DOMAIN}
    ALLOWED_HOSTS: ${ALLOWED_HOSTS}
    CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS}
    EMAIL_HOST: ${EMAIL_HOST}
    EMAIL_PORT: ${EMAIL_PORT}
    EMAIL_USE_TLS: ${EMAIL_USE_TLS}
    EMAIL_HOST_USER: ${EMAIL_HOST_USER}
    EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD}
    DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL}
    CONTACT_EMAIL: ${CONTACT_EMAIL}
    SESSION_COOKIE_DOMAIN: ${SESSION_COOKIE_DOMAIN}
    SENTRY_DSN: ${SENTRY_DSN:-}
    ENABLE_SENTRY: ${ENABLE_SENTRY:-false}
    ENVIRONMENT: stage
    SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.0}
    OPENAI_API_KEY: ${OPENAI_API_KEY}
    PROJECT_OWNER: ${PROJECT_OWNER:-Lukasz}
    REDIS_URL: redis://redis:6379/1
    CELERY_BROKER_URL: redis://redis:6379/0
    CELERY_RESULT_BACKEND: redis://redis:6379/0
    SKIP_PERMISSION_FIX: ${SKIP_PERMISSION_FIX:-false}
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_started

networks:
  stage_network:
  traefik_proxy:
    external: true

services:
  # ---------- Database ----------
  db:
    image: postgres:18
    restart: always
    networks:
      - stage_network
    environment:
      POSTGRES_DB: portfolio_stage
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - portfolio_staging_db_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d portfolio_stage"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------- Redis ----------
  redis:
    build:
      context: ./docker/redis
    restart: always
    networks:
      - stage_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---------- Celery Worker ----------
  celery-worker:
    <<: *backend-defaults
    image: ${ENVIRONMENT}-worker:${TAG}
    restart: always
    command: celery -A settings worker -l info -Q celery,monitoring --concurrency=${CELERY_WORKERS:-2}
    environment:
      <<: *backend-defaults-env
      MONITORING_LLM_PROVIDER: ${MONITORING_LLM_PROVIDER:-gpt}
    volumes:
      - portfolio_staging_media_data:/app/media
      - portfolio_staging_static_data:/app/staticfiles
      - ${DOCKER_LOGS_DIR:-/tmp/stage-docker-logs}:/app/docker-logs
    healthcheck:
      test: ["CMD-SHELL", "celery -A settings inspect ping -d celery@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---------- Celery Beat ----------
  celery-beat:
    <<: *backend-defaults
    image: ${ENVIRONMENT}-be:${TAG}
    profiles: ["manual-beat"]
    restart: always
    command: celery -A settings beat -l info -s /app/celerybeat/celerybeat-schedule
    environment:
      <<: *backend-defaults-env
    volumes:
      - portfolio_staging_media_data:/app/media
      - portfolio_staging_static_data:/app/staticfiles
      - portfolio_staging_celerybeat_data:/app/celerybeat

  # ---------- Frontend ----------
  fe:
    image: ${ENVIRONMENT}-fe:${TAG}
    restart: always
    networks:
      - stage_network
    expose:
      - "8080"
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN}
      SSR_CACHE_INVALIDATION_TOKEN: ${SSR_CACHE_INVALIDATION_TOKEN}
      PORT: 8080
      FRONTEND_PORT: 8080
      NODE_ENV: production
      API_URL: https://${API_DOMAIN}
      SSR_API_URL: http://be:8000
      PROJECT_OWNER: ${PROJECT_OWNER:-Lukasz}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ---------- Backend ----------
  be:
    <<: *backend-defaults
    image: ${ENVIRONMENT}-be:${TAG}
    restart: always
    environment:
      <<: *backend-defaults-env
      SSR_CACHE_INVALIDATION_URL: ${SSR_CACHE_INVALIDATION_URL:-http://fe:8080/internal/cache/invalidate}
      SSR_CACHE_INVALIDATION_TOKEN: ${SSR_CACHE_INVALIDATION_TOKEN}
    healthcheck:
      test: ["CMD-SHELL", "curl -f -H 'X-Forwarded-Proto: https' http://127.0.0.1:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  # ---------- Release Job ----------
  release:
    <<: *backend-defaults
    image: ${ENVIRONMENT}-be:${TAG}
    restart: "no"
    environment:
      <<: *backend-defaults-env
      SSR_CACHE_INVALIDATION_URL: ${SSR_CACHE_INVALIDATION_URL:-http://fe:8080/internal/cache/invalidate}
      SSR_CACHE_INVALIDATION_TOKEN: ${SSR_CACHE_INVALIDATION_TOKEN}
    command: >
      sh -c "
        python manage.py migrate --noinput &&
        python manage.py seed_settings &&
        python manage.py collectstatic --noinput
      "

  # ---------- Nginx ----------
  nginx:
    image: ${ENVIRONMENT}-nginx:${TAG}
    restart: always
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - stage_network
      - traefik_proxy
    volumes:
      - ${NGINX_LOG_DIR:-/var/log/portfolio/nginx/stage}:/var/log/nginx
      - portfolio_staging_media_data:/app/media:ro
      - portfolio_staging_static_data:/app/staticfiles:ro
      - portfolio_staging_nginx_blocklist:/etc/nginx/blocklist:ro
    labels:
      - "traefik.enable=true"
      # Main site routing
      - "traefik.http.routers.staging-site.rule=Host(`${SITE_DOMAIN}`)"
      - "traefik.http.routers.staging-site.entrypoints=websecure"
      - "traefik.http.routers.staging-site.tls=true"
      - "traefik.http.routers.staging-site.tls.certresolver=letsencrypt"
      - "traefik.http.routers.staging-site.middlewares=staging-whitelist@docker,staging-security@file"
      - "traefik.http.routers.staging-site.service=staging-site"

      # Admin routing
      - "traefik.http.routers.staging-admin.rule=Host(`admin.${SITE_DOMAIN}`)"
      - "traefik.http.routers.staging-admin.entrypoints=websecure"
      - "traefik.http.routers.staging-admin.tls=true"
      - "traefik.http.routers.staging-admin.tls.certresolver=letsencrypt"
      - "traefik.http.routers.staging-admin.middlewares=staging-whitelist@docker,staging-security@file,rate-limit@file"
      - "traefik.http.routers.staging-admin.priority=2"
      - "traefik.http.routers.staging-admin.service=staging-site"

      - "traefik.http.services.staging-site.loadbalancer.server.port=80"

volumes:
  portfolio_staging_db_data:
    external: true
  portfolio_staging_media_data:
    external: true
  portfolio_staging_static_data:
    external: true
  portfolio_staging_celerybeat_data:
    external: true
  portfolio_staging_nginx_blocklist:
    external: true
