# nginx/stage/local.conf
# ==============================================================================
# LOCAL STAGE CONFIG — stage.portfolio.local
#
# Mounted directly as /etc/nginx/nginx.conf (full config, no envsubst).
# Configured for SSL parity with production using self-signed certs.
# Remove /etc/hosts entries when done testing:
#   127.0.0.1  stage.portfolio.local
#   127.0.0.1  api.stage.portfolio.local
#   127.0.0.1  admin.stage.portfolio.local
# ==============================================================================

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    resolver 127.0.0.11 valid=30s;

    client_max_body_size 50M;

    upstream stage_frontend {
        server fe:80;
    }

    upstream stage_backend {
        server be:8000;
    }

    # Redirect HTTP to HTTPS
    server {
        listen 80;
        server_name stage.portfolio.local api.stage.portfolio.local admin.stage.portfolio.local staging.portfolio.local api.staging.portfolio.local admin.staging.portfolio.local;
        return 301 https://$host$request_uri;
    }

    # -------------------------
    # FRONTEND — stage.portfolio.local
    # -------------------------

    server {
        listen 443 ssl;
        server_name stage.portfolio.local staging.portfolio.local;

        ssl_certificate /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;

        access_log /var/log/nginx/stage-frontend.access.log;
        error_log /var/log/nginx/stage-frontend.error.log notice;

        location /assets/ {
            proxy_pass http://stage_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            expires 1y;
            add_header Cache-Control "public, immutable" always;
        }

        location = /index.html {
            proxy_pass http://stage_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            expires 0;
        }

        location / {
            proxy_pass http://stage_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /media/ {
            alias /app/media/;
            expires 30d;
            add_header Cache-Control "public";
            location /media/images/ {
                internal;
            }
        }
    }

    # -------------------------
    # API — api.stage.portfolio.local
    # -------------------------

    server {
        listen 443 ssl;
        server_name api.stage.portfolio.local api.staging.portfolio.local;

        ssl_certificate /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;

        access_log /var/log/nginx/stage-api.access.log;
        error_log /var/log/nginx/stage-api.error.log notice;

        location / {
            proxy_pass http://stage_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
        }

        location /media/ {
            alias /app/media/;
            autoindex off;
            expires 30d;
            add_header Cache-Control "public";
            location /media/images/ {
                internal;
            }
        }

        location /protected_media/ {
            internal;
            alias /app/media/;
        }
    }

    # -------------------------
    # ADMIN — admin.stage.portfolio.local
    # -------------------------

    server {
        listen 443 ssl;
        server_name admin.stage.portfolio.local admin.staging.portfolio.local;

        ssl_certificate /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;

        access_log /var/log/nginx/stage-admin.access.log;
        error_log /var/log/nginx/stage-admin.error.log notice;

        location / {
            proxy_pass http://stage_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
        }

        location /static/ {
            alias /app/staticfiles/;
            autoindex off;
            expires 30d;
            add_header Cache-Control "public";
        }

        location /media/ {
            alias /app/media/;
            autoindex off;
            expires 30d;
            add_header Cache-Control "public";
            location /media/images/ {
                internal;
            }
        }

        location /protected_media/ {
            internal;
            alias /app/media/;
        }
    }
}
