# nginx/stage/TEMPLATE.conf
# This file is a conf.d include — no worker_processes/events/http wrappers.
# Mounted as /etc/nginx/templates/default.conf.template and processed by envsubst.
# Only $SITE_DOMAIN and $ALLOWED_IP are substituted from the environment.

upstream frontend {
    server fe:80;
}
upstream backend {
    server be:8000;
}

# ---------- Frontend ----------
server {
    listen 80;
    server_name $SITE_DOMAIN stage.portfolio.local;
    return 301 https://$host$request_uri;
}
server {
    listen 443 ssl;
    server_name $SITE_DOMAIN stage.portfolio.local;

    allow $ALLOWED_IP;
    allow 127.0.0.1;
    allow 192.168.0.0/16;
    allow 172.16.0.0/12;
    allow 10.0.0.0/8;
    deny all;

    ssl_certificate /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;

    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ---------- API ----------
server {
    listen 80;
    server_name api.$SITE_DOMAIN api.stage.portfolio.local;
    return 301 https://$host$request_uri;
}
server {
    listen 443 ssl;
    server_name api.$SITE_DOMAIN api.stage.portfolio.local;

    allow $ALLOWED_IP;
    allow 127.0.0.1;
    allow 192.168.0.0/16;
    allow 172.16.0.0/12;
    allow 10.0.0.0/8;
    deny all;

    ssl_certificate /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;

    location / {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

# ---------- Admin ----------
server {
    listen 80;
    server_name admin.$SITE_DOMAIN admin.stage.portfolio.local;
    return 301 https://$host$request_uri;
}
server {
    listen 443 ssl;
    server_name admin.$SITE_DOMAIN admin.stage.portfolio.local;

    allow $ALLOWED_IP;
    allow 127.0.0.1;
    allow 192.168.0.0/16;
    allow 172.16.0.0/12;
    allow 10.0.0.0/8;
    deny all;

    ssl_certificate /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;

    location / {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;    }
    location /static/ { alias /app/staticfiles/; }
}
