# ==============================================================================
# PRODUCTION DEPLOYMENT GUIDE (Nginx Configuration)
#   On production, update the 'ssl_certificate' and 'ssl_certificate_key'
#    paths to point to your real certificates (usually mounted to /etc/nginx/ssl/).
#
# 3. CORS & HOSTS (backend/.env or Doppler):
#    Ensure your environment variables (ALLOWED_HOSTS, CORS_ALLOWED_ORIGINS)
#    exactly match the three domains you set here in Nginx.
#
# 4. RESOLVER:
#    The resolver (127.0.0.11) is standard for Docker. The timeout prevents locks.
#
# 5. DOCKER COMPOSE ENV VARS:
#    The production compose file uses these env vars for volume mapping:
#    - NGINX_CONF_PATH: Path to this nginx.conf
#    - NGINX_SSL_DIR: Path to SSL certs directory
#    - NGINX_LOG_DIR: Path to log directory
#
# 6. DOMAINS:
#    Change '$SITE_DOMAIN' to your real domain.
#
# 7. INCLUDES:
#    Shared config is extracted to nginx/includes/*.conf.template.
#    The nginx Docker entrypoint (20-envsubst-on-templates.sh) processes ALL
#    templates in /etc/nginx/templates/ and outputs them preserving structure,
#    so includes/ templates render to /etc/nginx/includes/*.conf automatically.
#    Each server block below includes:
#      - ssl.conf           → TLS config (certs, protocols, ciphers, session)
#      - security_headers.conf → HSTS, X-Frame, X-Content-Type, Referrer, Alt-Svc
#      - bot_protection.conf   → Bad-bot blocking via $bad_bot map
#      - error_pages.conf      → Unified 4xx/5xx error page
#      - security_locations.conf → Block hidden files, PHP, CMS probing
#
# ==============================================================================

# HTTP/3 / QUIC note:
# `listen 443 quic reuseport` enables QUIC/HTTP3 for inbound connections from clients.
# All proxy_pass to upstream Docker services uses HTTP/1.1 explicitly,
# because Docker networking does NOT support HTTP/2 or HTTP/3 between containers.

worker_processes auto;
pid /var/run/nginx.pid;

events {
    worker_connections 8192;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    server_tokens off;

    resolver 127.0.0.11 ipv6=off valid=30s;
    resolver_timeout 5s;

    # TTFB Optimization: Smaller buffer size for faster first-packet delivery
    ssl_buffer_size 4k;

    # Open File Cache for static performance
    open_file_cache max=10000 inactive=30s;
    open_file_cache_valid 60s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    # Rate Limiting Zone (API)
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    # Max upload size
    client_max_body_size 50M;

    # WebSocket mapping
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # Dynamic port suffix mapping to support both staging (:8443) and production (empty)
    # envsubst will replace these with values from the environment.
    map $http_host $nginx_port_suffix {
        default "$NGINX_PORT_SUFFIX";
    }

    # Dynamic port for headers (defaults to 443 in production if unset)
    map $http_host $nginx_forwarded_port {
        default "$NGINX_FORWARDED_PORT";
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        application/xml
        application/wasm
        image/svg+xml
        font/woff2;

    # -------------------------------------------------------------
    # Upstream Services (Connection Pooling)
    # -------------------------------------------------------------
    upstream backend_upstream {
        server be:8000;
        keepalive 32;
    }

    # -------------------------------------------------------------
    # Bot Blocklist (Maps and Global Settings)
    # -------------------------------------------------------------
    map $http_user_agent $bad_bot {
        default 0;
        include /etc/nginx/blocklist/blocklist.conf*;
    }

    # Combined map for blocking logic to avoid 'if' in server blocks
    map $bad_bot:$request_uri $should_block_bot {
        "~^1:.*error\.html" 0;   # Don't block bad bots from seeing error pages
        "~^1:"              1;   # Block bad bots everywhere else
        default             0;
    }

    # -------------------------------------------------------------
    # IP Restrictions (Conditional include for staging)
    # -------------------------------------------------------------
    include /etc/nginx/restrictions.conf*;

    # -------------------------
    # FRONTEND DOMAIN
    # -------------------------

    server {
        listen 80;
        listen [::]:80;
        server_name $SITE_DOMAIN;
        if ($should_block_bot) { return 403; }
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        # reuseport only on one server block — this is the canonical one
        listen 443 quic reuseport;
        listen [::]:443 quic reuseport;
        server_name $SITE_DOMAIN;

        include /etc/nginx/includes/ssl.conf;
        include /etc/nginx/includes/security_headers.conf;
        include /etc/nginx/includes/bot_protection.conf;
        include /etc/nginx/includes/error_pages.conf;
        include /etc/nginx/includes/security_locations.conf;

        # Content Security Policy (frontend-specific)
        set $CSP_FRONTEND "default-src 'self'; ";
        set $CSP_FRONTEND "${CSP_FRONTEND}worker-src 'self' blob:; ";
        set $CSP_FRONTEND "${CSP_FRONTEND}script-src 'self' 'unsafe-inline' data: https://www.googletagmanager.com https://www.google-analytics.com; ";
        set $CSP_FRONTEND "${CSP_FRONTEND}style-src 'self' 'unsafe-inline'; ";
        set $CSP_FRONTEND "${CSP_FRONTEND}font-src 'self'; ";
        # Specifically using $SITE_DOMAIN$nginx_port_suffix for strictness
        # Wildcard *.$SITE_DOMAIN matches subdomains, while $SITE_DOMAIN matches the apex
        set $CSP_FRONTEND "${CSP_FRONTEND}img-src 'self' data: https://$SITE_DOMAIN$nginx_port_suffix https://*.$SITE_DOMAIN$nginx_port_suffix https://www.google-analytics.com https://static.xx.fbcdn.net; ";
        set $CSP_FRONTEND "${CSP_FRONTEND}connect-src 'self' wss://$SITE_DOMAIN$nginx_port_suffix https://$SITE_DOMAIN$nginx_port_suffix https://*.$SITE_DOMAIN$nginx_port_suffix https://www.google-analytics.com https://*.sentry.io; ";
        set $CSP_FRONTEND "${CSP_FRONTEND}frame-ancestors 'none'; ";
        set $CSP_FRONTEND "${CSP_FRONTEND}upgrade-insecure-requests;";
        add_header Content-Security-Policy $CSP_FRONTEND always;

        access_log /var/log/nginx/frontend.access.log;
        error_log /var/log/nginx/frontend.error.log warn;

        root /usr/share/nginx/html;

        # 1. Hashed assets (Proxy in Dev, Volume in Prod)
        location /assets/ {
            $FRONTEND_ASSETS_LOGIC
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support for Vite HMR
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            expires 1y;
            add_header Cache-Control "public, immutable" always;
        }

        # 2. Never cache HTML entrypoint
        location = /index.html {
            $FRONTEND_ROOT_LOGIC
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            expires 0;
        }

        # 2.1 Browser caching for common static assets
        location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg|webp|webmanifest)$ {
            $FRONTEND_STATIC_EXT_LOGIC
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            include /etc/nginx/mime.types;
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable" always;

            # Performance: Close connection for missing static files instead of 404
            access_log off;
            log_not_found off;
        }

        # 2.5 Proxy sitemap.xml to Django backend
        location = /sitemap.xml {
            proxy_pass http://backend_upstream/sitemap.xml;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            expires 24h;
            add_header Cache-Control "public, max-age=86400" always;
        }

        # 3. Default fallback routing (Vite Proxy in Dev, index.html in Prod)
        location / {
            $FRONTEND_ROOT_LOGIC
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location ^~ /media/ {
            alias /app/media/;
            try_files $uri =404;

            autoindex off;
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable" always;

            # Re-add security headers (location-level add_header clears server-level)
            add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            set $CSP_FRONTEND_MEDIA "default-src 'self'; ";
            set $CSP_FRONTEND_MEDIA "${CSP_FRONTEND_MEDIA}frame-ancestors 'none';";
            add_header Content-Security-Policy $CSP_FRONTEND_MEDIA always;
        }

        # Explicitly deny access to full-size images folder
        location /media/images/ {
            internal;
        }

        # Explicitly deny direct access to sensitive logs
        location /media/logs/ {
            internal;
        }
    }

    # -------------------------
    # API DOMAIN
    # -------------------------

    server {
        listen 80;
        listen [::]:80;
        server_name api.$SITE_DOMAIN;
        if ($should_block_bot) { return 403; }
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        listen 443 quic;
        listen [::]:443 quic;
        server_name api.$SITE_DOMAIN;

        include /etc/nginx/includes/ssl.conf;
        include /etc/nginx/includes/security_headers.conf;
        include /etc/nginx/includes/bot_protection.conf;
        include /etc/nginx/includes/error_pages.conf;
        include /etc/nginx/includes/security_locations.conf;

        # Content Security Policy for API (minimal — API responses, not UI)
        set $CSP_API "default-src 'self'; ";
        set $CSP_API "${CSP_API}frame-ancestors 'none'; ";
        set $CSP_API "${CSP_API}upgrade-insecure-requests;";
        add_header Content-Security-Policy $CSP_API always;

        access_log /var/log/nginx/api.access.log;
        error_log /var/log/nginx/api.error.log warn;

        location / {


            limit_req zone=api burst=20 nodelay;
            proxy_pass http://backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_set_header X-Forwarded-Host $host$nginx_port_suffix;
            proxy_set_header X-Forwarded-Port $nginx_forwarded_port;
        }

        location /media/ {
            alias /app/media/;
            try_files $uri =404;

            autoindex off;
            expires 30d;
            add_header Cache-Control "public";

            # Re-add security headers
            add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            set $CSP_API_MEDIA "default-src 'self'; ";
            set $CSP_API_MEDIA "${CSP_API_MEDIA}frame-ancestors 'none';";
            add_header Content-Security-Policy $CSP_API_MEDIA always;
        }

        # Explicitly deny access to full-size images folder
        location /media/images/ {
            internal;
        }

        # Explicitly deny direct access to sensitive logs
        location /media/logs/ {
            internal;
        }

        # Internal location for X-Accel-Redirect
        location /protected_media/ {
            internal;
            alias /app/media/;
            try_files $uri =404;
        }
    }

    # -------------------------
    # ADMIN DOMAIN
    # -------------------------

    server {
        listen 80;
        listen [::]:80;
        server_name admin.$SITE_DOMAIN;
        if ($should_block_bot) { return 403; }
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        listen 443 quic;
        listen [::]:443 quic;
        server_name admin.$SITE_DOMAIN;

        include /etc/nginx/includes/ssl.conf;
        include /etc/nginx/includes/security_headers.conf;
        include /etc/nginx/includes/bot_protection.conf;
        include /etc/nginx/includes/error_pages.conf;
        include /etc/nginx/includes/security_locations.conf;

        # Content Security Policy for Admin (allows inline scripts for Django admin)
        set $CSP_ADMIN "default-src 'self'; ";
        set $CSP_ADMIN "${CSP_ADMIN}script-src 'self' 'unsafe-inline'; ";
        set $CSP_ADMIN "${CSP_ADMIN}style-src 'self' 'unsafe-inline'; ";
        set $CSP_ADMIN "${CSP_ADMIN}img-src 'self' data:; ";
        set $CSP_ADMIN "${CSP_ADMIN}connect-src 'self'; ";
        set $CSP_ADMIN "${CSP_ADMIN}frame-ancestors 'none'; ";
        set $CSP_ADMIN "${CSP_ADMIN}upgrade-insecure-requests;";
        add_header Content-Security-Policy $CSP_ADMIN always;

        access_log /var/log/nginx/admin.access.log;
        error_log /var/log/nginx/admin.error.log warn;

        location / {


            limit_req zone=api burst=20 nodelay;
            proxy_pass http://backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_set_header X-Forwarded-Host $host$nginx_port_suffix;
            proxy_set_header X-Forwarded-Port $nginx_forwarded_port;
        }

        location /static/ {
            alias /app/staticfiles/;
            try_files $uri =404;


            autoindex off;
            expires 30d;
            add_header Cache-Control "public";

            # Re-add security headers
            add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            set $CSP_ADMIN_STATIC "default-src 'self'; ";
            set $CSP_ADMIN_STATIC "${CSP_ADMIN_STATIC}frame-ancestors 'none';";
            add_header Content-Security-Policy $CSP_ADMIN_STATIC always;
        }

        location /media/ {
            alias /app/media/;
            try_files $uri =404;

            autoindex off;
            expires 30d;
            add_header Cache-Control "public";

            # Re-add security headers
            add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            set $CSP_ADMIN_MEDIA "default-src 'self'; ";
            set $CSP_ADMIN_MEDIA "${CSP_ADMIN_MEDIA}frame-ancestors 'none';";
            add_header Content-Security-Policy $CSP_ADMIN_MEDIA always;
        }

        # Explicitly deny access to full-size images folder
        location /media/images/ {
            internal;
        }

        # Explicitly deny direct access to sensitive logs
        location /media/logs/ {
            internal;
        }

        # Internal location for X-Accel-Redirect (Admin)
        location /protected_media/ {
            internal;
            alias /app/media/;
            try_files $uri =404;
        }
    }
}
