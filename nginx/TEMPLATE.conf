# ==============================================================================
# PRODUCTION DEPLOYMENT GUIDE (Nginx Configuration)
#   On production, update the 'ssl_certificate' and 'ssl_certificate_key'
#    paths to point to your real certificates (usually mounted to /etc/nginx/ssl/).
#
# 3. CORS & HOSTS (backend/.env or Doppler):
#    Ensure your environment variables (ALLOWED_HOSTS, CORS_ALLOWED_ORIGINS)
#    exactly match the three domains you set here in Nginx.
#
# 4. RESOLVER:
#    The resolver (127.0.0.11) is standard for Docker. Do not change it.
#
# 5. DOCKER COMPOSE ENV VARS:
#    The production compose file uses these env vars for volume mapping:
#    - NGINX_CONF_PATH: Path to this nginx.conf
#    - NGINX_SSL_DIR: Path to SSL certs directory
#    - NGINX_LOG_DIR: Path to log directory
#
# 6. DOMAINS:
#    Change '$SITE_DOMAIN' to your real domain.
#
# ==============================================================================

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    resolver 127.0.0.11 valid=30s;

    # Max upload size
    client_max_body_size 50M;

    # WebSocket mapping
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # Upstream services (Docker service names)
    upstream frontend_upstream {
        server portfolio-fe:3000;
    }

    upstream backend_upstream {
        server portfolio-be:8000;
    }

    # -------------------------
    # FRONTEND DOMAIN
    # -------------------------

    server {
        listen 80;
        server_name $SITE_DOMAIN;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name $SITE_DOMAIN;

        ssl_certificate /etc/nginx/ssl/$SSL_CERT_NAME;
        ssl_certificate_key /etc/nginx/ssl/$SSL_KEY_NAME;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        # -------------------------
        # GLOBAL SECURITY BLOCKS
        # -------------------------
        # Block hidden files and directories (except .well-known)
        location ~ /\.(?!well-known).* {
            deny all;
            access_log off;
            log_not_found off;
            return 404;
        }

        # Block prohibited extensions and scripts
        location ~ \.(php|py|pl|sh|lua|sql|cgi|bak|old|ini|7z|zip|rar|tar|gz)$ {
            deny all;
            access_log off;
            log_not_found off;
            return 404;
        }

        # Block malicious CMS paths probing
        location ~* /(wp-admin|wp-login|wp-content|xmlrpc\.php|setup\.php|config\.php|eval-stdin\.php) {
            deny all;
            access_log off;
            log_not_found off;
            return 404;
        }

        # Consolidated Security Headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        # Content Security Policy (Production-ready with placeholders)
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://$SITE_DOMAIN https://api.$SITE_DOMAIN https://admin.$SITE_DOMAIN https://*.$SITE_DOMAIN https://www.google-analytics.com; connect-src 'self' https://$SITE_DOMAIN https://api.$SITE_DOMAIN https://admin.$SITE_DOMAIN https://*.$SITE_DOMAIN https://www.google-analytics.com https://o1428522.ingest.sentry.io; frame-ancestors 'none';" always;

        access_log /var/log/nginx/frontend.access.log;
        error_log /var/log/nginx/frontend.error.log notice;

        # 1. Aggressive caching for hashed static assets
        location /assets/ {
            proxy_pass http://frontend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            expires 1y;
            add_header Cache-Control "public, immutable" always;
        }

        # 2. Validation caching for entrypoint (Never cache HTML)
        location = /index.html {
            proxy_pass http://frontend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            expires 0;
        }

        # 3. Default fallback routing
        location / {
            proxy_pass http://frontend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            # WebSocket support for HMR
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # 4. Vite HMR WebSocket
        location /ws {
            proxy_pass http://frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
        }

        location /media/ {
            alias /app/media/;
            expires 30d;
            add_header Cache-Control "public";

            # Re-add security headers (location-level add_header clears server-level)
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https://$SITE_DOMAIN https://api.$SITE_DOMAIN https://admin.$SITE_DOMAIN https://*.$SITE_DOMAIN; frame-ancestors 'none';" always;
        }

        # Explicitly deny access to full-size images folder
        location /media/images/ {
            internal;
        }

        # Explicitly deny direct access to sensitive logs
        location /media/logs/ {
            internal;
        }
    }

    # -------------------------
    # API DOMAIN
    # -------------------------

    server {
        listen 80;
        server_name api.$SITE_DOMAIN;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name api.$SITE_DOMAIN;

        ssl_certificate /etc/nginx/ssl/$SSL_CERT_NAME;
        ssl_certificate_key /etc/nginx/ssl/$SSL_KEY_NAME;

        # -------------------------
        # GLOBAL SECURITY BLOCKS
        # -------------------------
        # Block hidden files and directories (except .well-known)
        location ~ /\.(?!well-known).* {
            deny all;
            access_log off;
            log_not_found off;
            return 404;
        }

        # Block prohibited extensions and scripts
        location ~ \.(php|py|pl|sh|lua|sql|cgi|bak|old|ini|7z|zip|rar|tar|gz)$ {
            deny all;
            access_log off;
            log_not_found off;
            return 404;
        }

        # Block malicious CMS paths probing
        location ~* /(wp-admin|wp-login|wp-content|xmlrpc\.php|setup\.php|config\.php|eval-stdin\.php) {
            deny all;
            access_log off;
            log_not_found off;
            return 404;
        }

        # Consolidated Security Headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        # Content Security Policy for API (Lighter)
        add_header Content-Security-Policy "default-src 'self'; script-src 'none'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;

        access_log /var/log/nginx/api.access.log;
        error_log /var/log/nginx/api.error.log notice;

        location / {
            proxy_pass http://backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
        }

        location /media/ {
            alias /app/media/;
            autoindex off;
            expires 30d;
            add_header Cache-Control "public";

            # Re-add security headers
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; frame-ancestors 'none';" always;
        }

        # Explicitly deny access to full-size images folder
        location /media/images/ {
            internal;
        }

        # Explicitly deny direct access to sensitive logs
        location /media/logs/ {
            internal;
        }

        # Internal location for X-Accel-Redirect
        location /protected_media/ {
            internal;
            alias /app/media/;
        }
    }

    # -------------------------
    # ADMIN DOMAIN
    # -------------------------

    server {
        listen 80;
        server_name admin.$SITE_DOMAIN;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name admin.$SITE_DOMAIN;

        ssl_certificate /etc/nginx/ssl/$SSL_CERT_NAME;
        ssl_certificate_key /etc/nginx/ssl/$SSL_KEY_NAME;

        # -------------------------
        # GLOBAL SECURITY BLOCKS
        # -------------------------
        # Block hidden files and directories (except .well-known)
        location ~ /\.(?!well-known).* {
            deny all;
            access_log off;
            log_not_found off;
            return 404;
        }

        # Block prohibited extensions and scripts
        location ~ \.(php|py|pl|sh|lua|sql|cgi|bak|old|ini|7z|zip|rar|tar|gz)$ {
            deny all;
            access_log off;
            log_not_found off;
            return 404;
        }

        # Block malicious CMS paths probing
        location ~* /(wp-admin|wp-login|wp-content|xmlrpc\.php|setup\.php|config\.php|eval-stdin\.php) {
            deny all;
            access_log off;
            log_not_found off;
            return 404;
        }

        # Consolidated Security Headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        # Content Security Policy for Admin
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;

        access_log /var/log/nginx/admin.access.log;
        error_log /var/log/nginx/admin.error.log notice;

        location / {
            proxy_pass http://backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
        }

        location /static/ {
            alias /app/staticfiles/;
            autoindex off;
            expires 30d;
            add_header Cache-Control "public";

            # Re-add security headers
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; frame-ancestors 'none';" always;
        }

        location /media/ {
            alias /app/media/;
            autoindex off;
            expires 30d;
            add_header Cache-Control "public";

            # Re-add security headers
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; frame-ancestors 'none';" always;
        }

        # Explicitly deny access to full-size images folder
        location /media/images/ {
            internal;
        }

        # Explicitly deny direct access to sensitive logs
        location /media/logs/ {
            internal;
        }

        # Internal location for X-Accel-Redirect (Admin)
        location /protected_media/ {
            internal;
            alias /app/media/;
        }
    }
}
