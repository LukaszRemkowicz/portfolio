user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log notice;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Increase max body size to 50MB
    client_max_body_size 50M;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
    '$status $body_bytes_sent "$http_referer" '
    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main buffer=32k;
    error_log /var/log/nginx/error.log notice;

    sendfile on;
    keepalive_timeout 65;

    # Security Headers moved to server blocks for reliable inheritance
    resolver 127.0.0.11 valid=30s;

    upstream frontend {
        server portfolio-fe:3000;
    }

    upstream backend {
        server portfolio-be:8000;
    }

    # -------------------------
    # FRONTEND DOMAIN
    # -------------------------

    server {
        listen 80;
        server_name portfolio.local;
        return 301 https://$server_name$request_uri;
    }

    server {
        listen 443 ssl;
        server_name portfolio.local;

        ssl_certificate /etc/nginx/ssl/portfolio.local.crt;
        ssl_certificate_key /etc/nginx/ssl/portfolio.local.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        access_log /var/log/nginx/portfolio-ssl.access.log main;
        error_log /var/log/nginx/portfolio-ssl.error.log notice;

        # Consolidated Security Headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        # CSP: Explicitly allow self and subdomains
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://portfolio.local https://api.portfolio.local https://admin.portfolio.local https://*.portfolio.local https://www.google-analytics.com; connect-src 'self' https://portfolio.local https://api.portfolio.local https://admin.portfolio.local https://*.portfolio.local https://www.google-analytics.com https://o1428522.ingest.sentry.io; frame-ancestors 'none';" always;

        # 1. Aggressive caching for hashed static assets
        location /assets/ {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            expires 1y;
            add_header Cache-Control "public, immutable" always;
        }

        # 2. Validation caching for entrypoint (Never cache HTML)
        location = /index.html {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            expires 0;
        }

        # 3. Default fallback routing
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /media/ {
            alias /app/media/;
            expires 30d;
            add_header Cache-Control "public";

            # Re-add security headers (location-level add_header clears server-level)
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https://portfolio.local https://api.portfolio.local https://admin.portfolio.local https://*.portfolio.local; frame-ancestors 'none';" always;

            # Explicitly deny access to full-size images folder
            location /media/images/ {
                internal;
            }
        }
    }

    # -------------------------
    # API DOMAIN
    # -------------------------

    server {
        listen 80;
        server_name api.portfolio.local;
        return 301 https://$server_name$request_uri;
    }

    server {
        listen 443 ssl;
        server_name api.portfolio.local;

        ssl_certificate /etc/nginx/ssl/portfolio.local.crt;
        ssl_certificate_key /etc/nginx/ssl/portfolio.local.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        access_log /var/log/nginx/api.access.log main;
        error_log /var/log/nginx/api.error.log notice;

        # Consolidated Security Headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        # Content Security Policy for API (Lighter)
        add_header Content-Security-Policy "default-src 'self'; script-src 'none'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;

        location / {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host api.portfolio.local;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
        }

        location /media/ {
            alias /app/media/;
            autoindex off;
            expires 30d;
            add_header Cache-Control "public";

            # Re-add security headers
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; frame-ancestors 'none';" always;

            # Explicitly deny access to full-size images folder
            location /media/images/ {
                internal;
            }

        }

        # Internal location for X-Accel-Redirect
        location /protected_media/ {
            internal;
            alias /app/media/;
        }
    }

    # -------------------------
    # ADMIN DOMAIN
    # -------------------------

    server {
        listen 80;
        server_name admin.portfolio.local;
        return 301 https://$server_name$request_uri;
    }

    server {
        listen 443 ssl;
        server_name admin.portfolio.local;

        ssl_certificate /etc/nginx/ssl/portfolio.local.crt;
        ssl_certificate_key /etc/nginx/ssl/portfolio.local.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        access_log /var/log/nginx/backend.access.log main;
        error_log /var/log/nginx/backend.error.log notice;

        # Consolidated Security Headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        # Content Security Policy for Admin
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;

        location / {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host admin.portfolio.local;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
        }

        location /static/ {
            # Local Dev: staticfiles not collected inside nginx volume, so proxy to backend
            proxy_pass http://backend/static/;
            proxy_set_header Host admin.portfolio.local;

            # Re-add security headers for static
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; frame-ancestors 'none';" always;
        }

        location /media/ {
            alias /app/media/;
            autoindex off;
            expires 30d;
            add_header Cache-Control "public";

            # Re-add security headers
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; frame-ancestors 'none';" always;

            # Explicitly deny access to full-size images folder
            location /media/images/ {
                internal;
            }
        }

        # Internal location for X-Accel-Redirect (Admin)
        location /protected_media/ {
            internal;
            alias /app/media/;
        }
    }
}
