networks:
  portfolio_network:


x-backend-common: &backend-common
  build:
    context: ./backend
    target: development
  networks:
    - portfolio_network
  volumes:
    - ./backend:/app
  env_file:
    - path: ./backend/.env
      required: false
  environment:
    DOCKER_ENV: "true"
    PYTHONPATH: "."
    TZ: "Europe/Warsaw"
  depends_on:
    - db
    - redis


x-frontend-common: &frontend-common
  build:
    context: .
    dockerfile: frontend/Dockerfile
    target: dev
  networks:
    - portfolio_network
  volumes:
    - ./frontend:/app
    - fe_node_modules:/app/node_modules

services:
  portfolio-fe:
    <<: *frontend-common
    environment:
      VITE_API_URL: https://${API_DOMAIN:-api.portfolio.local}
      VITE_GA_TRACKING_ID: ${GA_TRACKING_ID:-G-2WGK87YBL6}
      VITE_ENABLE_GA: ${ENABLE_GA:-false}
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - fe_node_modules:/app/node_modules
      - ./nginx/ssl/certs:/etc/nginx/ssl:ro

  portfolio-be:
    <<: *backend-common
    ports:
      - "127.0.0.1:8000:8000"
    command: >
      sh -c "
        python manage.py migrate --noinput &&
        python manage.py seed_settings &&
        python manage.py compilemessages &&
        python manage.py collectstatic --noinput &&
        python manage.py runserver 0.0.0.0:8000
      "

  portfolio-fe-test:
    <<: *frontend-common
    profiles: [ "test" ]
    command: npm test

  portfolio-test:
    <<: *backend-common
    profiles: [ "test" ]
    command: pytest

  db:
    image: postgres:17
    restart: unless-stopped
    networks:
      - portfolio_network
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      POSTGRES_DB: ${DB_NAME:-portfolio}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${DB_USER:-postgres} -d $${DB_NAME:-portfolio}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_17_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - portfolio_network
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  celery-worker:
    <<: *backend-common
    command: watchmedo auto-restart --directory=./ --pattern=*.py --recursive -- celery -A settings worker -l info
    restart: unless-stopped
    depends_on:
      - db
      - redis
    healthcheck:
      test: ["CMD-SHELL", "celery -A settings inspect ping -d celery@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  flower:
    <<: *backend-common
    command: celery -A settings flower
    ports:
      - "127.0.0.1:5555:5555"
    restart: unless-stopped
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      FLOWER_BASIC_AUTH: ${FLOWER_BASIC_AUTH:-admin:admin}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      celery-worker:
        condition: service_healthy

  portfolio-nginx:
    image: nginx:1.25
    networks:
      - portfolio_network
    depends_on:
      - portfolio-fe
      - portfolio-be
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl/certs:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
      - ./backend/media:/app/media:ro

volumes:
  postgres_17_data:
  fe_node_modules:
