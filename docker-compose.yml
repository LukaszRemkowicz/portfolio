networks:
  portfolio_network:


x-backend-common: &backend-common
  build:
    context: ./backend
    dockerfile: ../docker/backend/Dockerfile
    target: development
  networks:
    - portfolio_network
  volumes:
    - ./backend:/app
    - local_static_data:/app/staticfiles
  env_file:
    - path: ./backend/.env
      required: false
  environment:
    DOCKER_ENV: "true"
    PYTHONPATH: "."
    TZ: "Europe/Warsaw"
  depends_on:
    - db
    - redis


x-frontend-common: &frontend-common
  build:
    context: .
    dockerfile: docker/frontend/Dockerfile
    target: dev
  networks:
    - portfolio_network
  volumes:
    - ./frontend:/app
    - fe_node_modules:/app/node_modules

services:
  portfolio-fe:
    <<: *frontend-common
    environment:
      VITE_API_URL: https://${API_DOMAIN:-api.portfolio.local}
      VITE_GA_TRACKING_ID: ${GA_TRACKING_ID:-G-2WGK87YBL6}
      VITE_ENABLE_GA: ${ENABLE_GA:-false}
      FRONTEND_PORT: ${FRONTEND_PORT:-8080}
    ports:
      - "127.0.0.1:3000:8080"
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - fe_node_modules:/app/node_modules
      - ./nginx/ssl/certs:/etc/nginx/ssl:ro

  portfolio-be:
    <<: *backend-common
    ports:
      - "127.0.0.1:8000:8000"
    command: >
      sh -c "
        python manage.py migrate --noinput &&
        python manage.py seed_settings &&
        python manage.py compilemessages &&
        python manage.py collectstatic --noinput &&
        python manage.py runserver 0.0.0.0:8000
      "

  portfolio-fe-test:
    <<: *frontend-common
    profiles: [ "test" ]
    command: npm test

  portfolio-test:
    <<: *backend-common
    profiles: [ "test" ]
    command: pytest

  db:
    image: postgres:15
    restart: unless-stopped
    networks:
      - portfolio_network
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      POSTGRES_DB: ${DB_NAME:-portfolio}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${DB_USER:-postgres} -d $${DB_NAME:-portfolio}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    build:
      context: ./docker/redis
    restart: unless-stopped
    networks:
      - portfolio_network
    ports:
      - "127.0.0.1:6379:6379"
    env_file:
      - path: ./backend/.env
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping || redis-cli ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  celery-worker:
    <<: *backend-common
    command: watchmedo auto-restart --directory=./ --pattern=*.py --recursive -- celery -A settings worker -l info
    restart: unless-stopped
    depends_on:
      - db
      - redis
    healthcheck:
      test: ["CMD-SHELL", "celery -A settings inspect ping -d celery@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  flower:
    <<: *backend-common
    command: sh -c 'export CELERY_BROKER_URL="redis://:$$REDIS_PASSWORD@redis:6379/0" && export CELERY_RESULT_BACKEND="redis://:$$REDIS_PASSWORD@redis:6379/0" && exec celery -A settings flower'
    ports:
      - "127.0.0.1:5555:5555"
    restart: unless-stopped
    environment:
      FLOWER_BASIC_AUTH: ${FLOWER_BASIC_AUTH:-admin:admin}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      celery-worker:
        condition: service_healthy

  portfolio-nginx:
    image: nginx:1.25
    networks:
      - portfolio_network
    depends_on:
      - portfolio-fe
      - portfolio-be
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN:-portfolio.local}
      SSL_CERT_NAME: ${SSL_CERT_NAME:-portfolio.local.crt}
      SSL_KEY_NAME: ${SSL_KEY_NAME:-portfolio.local.key}
      FRONTEND_PORT: ${FRONTEND_PORT:-8080}
      NGINX_ENVSUBST_OUTPUT_DIR: /etc/nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/TEMPLATE.conf:/etc/nginx/templates/nginx.conf.template:ro
      - ./nginx/ssl/certs:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
      - ./backend/media:/app/media:ro
      - local_static_data:/app/staticfiles:ro

volumes:
  postgres_data:
  fe_node_modules:
  local_static_data:
