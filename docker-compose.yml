networks:
  portfolio_network:

include:
  - docker-compose.common.yml


x-backend-common: &backend-common
  build:
    context: .
    dockerfile: docker/backend/Dockerfile
    target: development
  networks:
    - portfolio_network
  volumes:
    - ./backend:/app
    - local_static_data:/app/staticfiles
  environment:
    DOCKER_ENV: "true"
    PYTHONPATH: "."
    TZ: "Europe/Warsaw"
    SECRET_KEY: ${SECRET_KEY}
    DB_NAME: ${DB_NAME}
    DB_USER: ${DB_USER}
    DB_PASSWORD: ${DB_PASSWORD}
    DB_HOST: ${DB_HOST:-db}
    DB_PORT: 5432
    ADMIN_DOMAIN: ${ADMIN_DOMAIN}
    API_DOMAIN: ${API_DOMAIN}
    CSRF_COOKIE_DOMAIN: ${CSRF_COOKIE_DOMAIN}
    ALLOWED_HOSTS: ${ALLOWED_HOSTS}
    CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS}
    EMAIL_HOST: ${EMAIL_HOST}
    EMAIL_PORT: ${EMAIL_PORT}
    EMAIL_USE_TLS: ${EMAIL_USE_TLS}
    EMAIL_HOST_USER: ${EMAIL_HOST_USER}
    EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD}
    DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL}
    CONTACT_EMAIL: ${CONTACT_EMAIL}
    SESSION_COOKIE_DOMAIN: ${SESSION_COOKIE_DOMAIN}
    SENTRY_DSN: ${SENTRY_DSN}
    ENVIRONMENT: ${ENVIRONMENT:-production}
    MONITORING_LLM_PROVIDER: ${MONITORING_LLM_PROVIDER:-gpt}
    PROJECT_OWNER: ${PROJECT_OWNER}
    REDIS_PASSWORD: ${REDIS_PASSWORD}
    SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
    OPENAI_API_KEY: ${OPENAI_API_KEY}
    SKIP_PERMISSION_FIX: ${SKIP_PERMISSION_FIX:-false}
  depends_on:
    - db
    - redis


x-frontend-common: &frontend-common
  build:
    context: .
    dockerfile: docker/frontend/Dockerfile
    target: dev
  networks:
    - portfolio_network
  volumes:
    - ./frontend:/app
    - fe_node_modules:/app/node_modules

services:
  fe:
    <<: *frontend-common
    environment:
      VITE_API_URL: https://${API_DOMAIN:-api.portfolio.local}
      VITE_GA_TRACKING_ID: ${GA_TRACKING_ID:-G-2WGK87YBL6}
      VITE_ENABLE_GA: ${ENABLE_GA:-false}
      FRONTEND_PORT: ${FRONTEND_PORT:-8080}
    ports:
      - "127.0.0.1:3000:8080"
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - fe_node_modules:/app/node_modules
      - ./nginx/ssl/certs:/etc/nginx/ssl:ro
      - nginx_blocklist:/etc/nginx/blocklist:ro

  be:
    <<: *backend-common
    ports:
      - "127.0.0.1:8000:8000"
    command: >
      sh -c "
        python manage.py migrate --noinput &&
        python manage.py seed_settings &&
        python manage.py compilemessages &&
        python manage.py collectstatic --noinput &&
        python manage.py runserver 0.0.0.0:8000
      "

  fe-test:
    <<: *frontend-common
    profiles: [ "test" ]
    command: npm test

  test:
    <<: *backend-common
    profiles: [ "test" ]
    command: pytest

  db:
    image: postgres:18
    restart: unless-stopped
    networks:
      - portfolio_network
    environment:
      POSTGRES_DB: ${DB_NAME:-portfolio}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${DB_USER:-postgres} -d $${DB_NAME:-portfolio}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres18_data:/var/lib/postgresql


  redis:
    build:
      context: ./docker/redis
    restart: unless-stopped
    networks:
      - portfolio_network
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping || redis-cli ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  celery-worker:
    <<: *backend-common
    command: watchmedo auto-restart --directory=./ --pattern=*.py --recursive -- celery -A settings worker -l info
    restart: unless-stopped
    depends_on:
      - db
      - redis
    healthcheck:
      test: ["CMD-SHELL", "celery -A settings inspect ping -d celery@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  flower:
    <<: *backend-common
    command: sh -c 'export CELERY_BROKER_URL="redis://:$$REDIS_PASSWORD@redis:6379/0" && export CELERY_RESULT_BACKEND="redis://:$$REDIS_PASSWORD@redis:6379/0" && exec celery -A settings flower'
    ports:
      - "127.0.0.1:5555:5555"
    restart: unless-stopped
    environment:
      FLOWER_BASIC_AUTH: ${FLOWER_BASIC_AUTH:-admin:admin}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      celery-worker:
        condition: service_healthy

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    image: nginx:latest
    networks:
      - portfolio_network
    depends_on:
      - fe
      - be
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN:-portfolio.local}
      NGINX_SSL_CERT: ${SSL_CERT_NAME:-portfolio.local.crt}
      NGINX_SSL_KEY: ${SSL_KEY_NAME:-portfolio.local.key}
      FRONTEND_PORT: ${FRONTEND_PORT:-8080}
      FRONTEND_ASSETS_LOGIC: "proxy_pass http://fe:8080;"
      FRONTEND_ROOT_LOGIC: "proxy_pass http://fe:8080;"
      FRONTEND_STATIC_EXT_LOGIC: "proxy_pass http://fe:8080;"
      NGINX_ENVSUBST_OUTPUT_DIR: /etc/nginx
      NGINX_ENVSUBST_FILTER: SITE_DOMAIN|FRONTEND_PORT|NGINX_SSL_CERT|NGINX_SSL_KEY|FRONTEND_ASSETS_LOGIC|FRONTEND_ROOT_LOGIC|FRONTEND_STATIC_EXT_LOGIC|NGINX_ENVSUBST_OUTPUT_DIR
    ports:
      - "80:80"
      - "443:443/tcp"
      - "443:443/udp"
    volumes:
      - ./nginx/TEMPLATE.conf:/etc/nginx/templates/nginx.conf.template:ro
      - ./nginx/includes/:/etc/nginx/templates/includes/:ro
      - ./nginx/ssl/certs:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
      - ./backend/media:/app/media:ro
      - ./frontend/public:/usr/share/nginx/html/errors:ro
      - local_static_data:/app/staticfiles:ro
      - nginx_blocklist:/etc/nginx/blocklist:ro

volumes:
  postgres_data:
  postgres18_data:
  fe_node_modules:
  local_static_data:
