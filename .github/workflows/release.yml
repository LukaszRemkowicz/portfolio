name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write
  attestations: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ vars.IMAGE_NAMESPACE }}

jobs:
  tag-main:
    name: Tag main from VERSION
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.release_tag.outputs.value }}
      tag_created: ${{ steps.release_tag.outputs.created }}
      version_changed: ${{ steps.release_tag.outputs.version_changed }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push tag (if missing)
        id: release_tag
        shell: bash
        run: |
          set -euo pipefail

          git fetch origin main --tags

          # Find the latest tag matching v*
          # Use xargs to trim potential whitespace, although sort should handle it
          LATEST_TAG=$(git tag -l "v*" --sort=-v:refname | head -n 1)

          if [[ -z "$LATEST_TAG" ]]; then
            echo "⚠️ No previous release tag found. Proceeding with initial version."
            VERSION_CHANGED="true"
          else
            echo "🏷️ Latest release tag: $LATEST_TAG"

            # Extract version from old tag's VERSION file
            # tr -d is used to ensure no hidden characters interfere
            if git cat-file -e "$LATEST_TAG:VERSION" 2>/dev/null; then
              OLD_VER=$(git show "$LATEST_TAG:VERSION" | tr -d ' \t\r\n')
            else
              echo "⚠️ VERSION file missing in $LATEST_TAG. Assuming 0.0.0 baseline."
              OLD_VER="0.0.0"
            fi
            CUR_VER=$(tr -d ' \t\r\n' < VERSION)

            if [[ "$OLD_VER" == "$CUR_VER" ]]; then
              echo "ℹ️ VERSION ($CUR_VER) has not changed since $LATEST_TAG. Skipping."
              echo "value=v${CUR_VER}" >> "${GITHUB_OUTPUT}"
              echo "created=false" >> "${GITHUB_OUTPUT}"
              echo "version_changed=false" >> "${GITHUB_OUTPUT}"
              exit 0
            fi
            echo "🚀 Version change detected: $OLD_VER -> $CUR_VER"
            VERSION_CHANGED="true"
          fi

          if [[ ! -f VERSION ]]; then
            echo "❌ ERROR: VERSION file missing on main."
            exit 1
          fi

          VER="$(tr -d ' \t\r\n' < VERSION)"
          if ! [[ "$VER" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ ERROR: VERSION must be MAJOR.MINOR.PATCH, got: '$VER'"
            exit 1
          fi

          TAG="v$VER"
          echo "🏷️  Target tag: $TAG"

          git fetch --tags
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "ℹ️ Tag already exists: $TAG (skipping)"
            echo "value=${TAG}" >> "${GITHUB_OUTPUT}"
            echo "created=false" >> "${GITHUB_OUTPUT}"
            echo "version_changed=${VERSION_CHANGED:-true}" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

          echo "✅ Created and pushed tag: $TAG"
          echo "value=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "created=true" >> "${GITHUB_OUTPUT}"
          echo "version_changed=true" >> "${GITHUB_OUTPUT}"

  publish-production:
    name: Publish Production Images
    runs-on: ubuntu-latest
    needs: [tag-main]
    if: github.event_name == 'push' && needs.tag-main.outputs.version_changed == 'true'
    environment: portfolio-registry
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve image tag
        id: image_tag
        shell: bash
        run: |
          set -euo pipefail

          TAG="${{ needs.tag-main.outputs.release_tag }}"

          if [[ -z "${TAG}" ]]; then
            echo "ERROR: Resolved image tag is empty."
            exit 1
          fi

          echo "value=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "Resolved image tag: ${TAG}"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Docker metadata for production backend
        id: meta_backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/production-be
          tags: |
            type=raw,value=${{ steps.image_tag.outputs.value }}

      - name: Build and push production backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/backend/Dockerfile
          target: production
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.meta_backend.outputs.tags }}
          labels: ${{ steps.meta_backend.outputs.labels }}

      - name: Docker metadata for production frontend
        id: meta_frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/production-fe
          tags: |
            type=raw,value=${{ steps.image_tag.outputs.value }}

      - name: Build and push production frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/frontend/Dockerfile
          target: prod
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            SITE_DOMAIN=${{ vars.SITE_DOMAIN }}
            API_URL=https://${{ vars.API_DOMAIN }}
            GA_TRACKING_ID=${{ vars.GA_TRACKING_ID }}
            SENTRY_DSN_FE=${{ secrets.SENTRY_DSN_FE }}
            ENVIRONMENT=production
            ALLOWED_HOSTS=${{ vars.ALLOWED_HOSTS }}
            PROJECT_OWNER=${{ vars.PROJECT_OWNER }}
          tags: ${{ steps.meta_frontend.outputs.tags }}
          labels: ${{ steps.meta_frontend.outputs.labels }}

      - name: Docker metadata for production nginx
        id: meta_nginx
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/production-nginx
          tags: |
            type=raw,value=${{ steps.image_tag.outputs.value }}

      - name: Build and push production nginx
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/nginx/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.meta_nginx.outputs.tags }}
          labels: ${{ steps.meta_nginx.outputs.labels }}
