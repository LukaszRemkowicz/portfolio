name: CI/CD

on:
  pull_request:

env:
  PROJECT_OWNER: "GitHub Actions"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  frontend:
    uses: LukaszRemkowicz/ci-cd/.github/workflows/node-ci.yml@main
    with:
      node_version: "20"
      working_directory: frontend
      cache_dependency_path: frontend/package-lock.json
      install_command: npm ci
      lint_command: npm run lint
      format_check_command: npm run format:check || (npx prettier --list-different 'src/**/*.{ts,tsx,css}' && exit 1)
      type_check_command: npx tsc --noEmit
      test_command: API_URL=http://localhost:8000 npm test -- --coverage --watchAll=false

  backend:
    uses: LukaszRemkowicz/ci-cd/.github/workflows/python-uv-ci.yml@main
    with:
      python_version: "3.13"
      working_directory: backend
      cache_dependency_glob: backend/uv.lock
      dependency_install_command: uv sync --locked
      pre_commit_command: SKIP=prettier,eslint,frontend-tests,backend-tests,safety uv run pre-commit run --all-files
      test_command: DB_HOST=localhost DB_NAME=test_db DB_USER=postgres DB_PASSWORD=postgres DB_PORT=5432 DEFAULT_FROM_EMAIL=test@example.com CONTACT_EMAIL=test@example.com SESSION_COOKIE_DOMAIN=.example.com uv run pytest --cov=. --cov-report=xml
      postgres_enabled: true
      postgres_db: test_db
      postgres_user: postgres
      postgres_password: postgres
      postgres_port: "5432"

  trivy-scan:
    needs: [frontend, backend]
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: LukaszRemkowicz/ci-cd/.github/workflows/trivy-scan.yml@main

  dependency-security:
    name: Dependency Security Checks
    runs-on: ubuntu-latest
    environment: portfolio_tests
    needs: [frontend, backend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run npm audit
        working-directory: ./frontend
        run: npm audit --audit-level=moderate

      - name: Run Safety CLI to check for vulnerabilities
        uses: pyupio/safety-action@v1
        with:
          api-key: ${{ secrets.SAFETY_API_KEY }}

  image-build-check:
    name: Production Image Build Check
    runs-on: ubuntu-latest
    needs: [frontend, backend, trivy-scan, dependency-security]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build production backend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/backend/Dockerfile
          target: production
          platforms: linux/amd64,linux/arm64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build production frontend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/frontend/Dockerfile
          target: prod
          platforms: linux/amd64,linux/arm64
          push: false
          build-args: |
            SITE_DOMAIN=test.local
            API_URL=https://api.test.local
            GA_TRACKING_ID=test
            SENTRY_DSN_FE=test
            ENVIRONMENT=production
            ALLOWED_HOSTS=test.local,localhost,127.0.0.1
            PROJECT_OWNER=test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend runtime smoke image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/frontend/Dockerfile
          target: prod
          platforms: linux/amd64
          load: true
          tags: frontend-smoke:ci
          build-args: |
            SITE_DOMAIN=test.local
            API_URL=https://api.test.local
            GA_TRACKING_ID=test
            SENTRY_DSN_FE=test
            ENVIRONMENT=production
            ALLOWED_HOSTS=test.local,localhost,127.0.0.1
            PROJECT_OWNER=test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test frontend runtime
        run: |
          set -euo pipefail

          docker rm -f frontend-smoke-test >/dev/null 2>&1 || true

          docker run -d \
            --name frontend-smoke-test \
            -p 18080:8080 \
            frontend-smoke:ci

          cleanup() {
            status=$?
            if [[ $status -ne 0 ]]; then
              docker logs frontend-smoke-test || true
            fi
            docker rm -f frontend-smoke-test >/dev/null 2>&1 || true
            exit $status
          }
          trap cleanup EXIT

          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:18080/health >/dev/null; then
              echo "Frontend runtime smoke test passed"
              exit 0
            fi
            sleep 1
          done

          echo "Frontend runtime smoke test failed"
          exit 1

      - name: Build production nginx image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/nginx/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  pr-status:
    needs: [frontend, backend, trivy-scan, dependency-security, image-build-check]
    if: always()
    uses: LukaszRemkowicz/ci-cd/.github/workflows/pr-status.yml@main
    with:
      status_items_json: >-
        {"Frontend (Lint/Types/Tests)":"${{ needs.frontend.result }}","Backend (Lint/Types/Tests)":"${{ needs.backend.result }}","Trivy Security Analysis":"${{ needs.trivy-scan.result }}","Dependency Security Checks":"${{ needs.dependency-security.result }}","Production Image Build Check":"${{ needs.image-build-check.result }}"}
      success_message: 🎉 **All checks passed!**
      failure_message: ⚠️ **Some checks failed. Please review the logs.**
