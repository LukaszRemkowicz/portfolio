name: CI/CD

on:
  pull_request:

env:
  PYTHON_VERSION: "3.13"
  NODE_VERSION: "20"
  PROJECT_OWNER: "GitHub Actions"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Frontend: Lint, Type Check, and Test
  frontend:
    name: Frontend Quality & Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run ESLint
        working-directory: ./frontend
        run: npm run lint

      - name: Run Prettier check
        working-directory: ./frontend
        run: npm run format:check || (npx prettier --list-different 'src/**/*.{ts,tsx,css}' && exit 1)

      - name: TypeScript type check
        working-directory: ./frontend
        run: npx tsc --noEmit

      - name: Run tests
        working-directory: ./frontend
        run: npm test -- --coverage --watchAll=false
        env:
          API_URL: http://localhost:8000

      - name: Upload coverage reports
        if: github.event_name == 'push'
        uses: codecov/codecov-action@v6
        with:
          files: ./frontend/coverage/lcov.info
          flags: frontend
          token: ${{ secrets.CODECOV_TOKEN }}

  # Backend: Lint, Type Check, and Test
  backend:
    name: Backend Quality & Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      DB_HOST: localhost
      DB_NAME: test_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_PORT: 5432
      DEFAULT_FROM_EMAIL: test@example.com
      CONTACT_EMAIL: test@example.com
      SESSION_COOKIE_DOMAIN: .example.com
      SAFETY_API_KEY: ${{ secrets.SAFETY_API_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: backend/.venv
          key: ${{ runner.os }}-poetry-${{ hashFiles('backend/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-

      - name: Install dependencies
        working-directory: ./backend
        run: poetry sync --no-root --no-interaction

      - name: Run Pre-commit hooks
        working-directory: ./backend
        env:
          SKIP: prettier,eslint,frontend-tests,backend-tests
        run: poetry run pre-commit run --all-files

      - name: Run tests
        working-directory: ./backend
        run: poetry run pytest --cov=. --cov-report=xml

      - name: Upload coverage reports
        if: github.event_name == 'push'
        uses: codecov/codecov-action@v6
        with:
          files: ./backend/coverage.xml
          flags: backend
          token: ${{ secrets.CODECOV_TOKEN }}

  # Docker Build/Test
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build and load for scanning
        uses: docker/bake-action@v6.1.0
        with:
          files: |
            docker-compose.yml
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max
          load: true

  security-scan:
    name: Security Analysis
    runs-on: ubuntu-latest
    environment: portfolio_tests
    needs: [frontend, backend]
    permissions:
      security-events: write
      actions: read
      contents: read
    env:
      DB_HOST: localhost
      DB_NAME: test_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_PORT: 5432
      DEFAULT_FROM_EMAIL: test@example.com
      CONTACT_EMAIL: test@example.com
      SESSION_COOKIE_DOMAIN: .example.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            aquasec/trivy:0.58.1 fs \
              --format sarif \
              --output trivy-results.sarif \
              --exit-code 0 \
              --severity CRITICAL,HIGH \
              .

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: "trivy-results.sarif"
          category: "trivy"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run npm audit
        working-directory: ./frontend
        run: npm audit --audit-level=moderate

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run Safety CLI to check for vulnerabilities
        uses: pyupio/safety-action@v1
        with:
          api-key: ${{ secrets.SAFETY_API_KEY }}

  image-build-check:
    name: Production Image Build Check
    runs-on: ubuntu-latest
    needs: [frontend, backend, docker-build, security-scan]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build production backend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/backend/Dockerfile
          target: production
          platforms: linux/amd64,linux/arm64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build production frontend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/frontend/Dockerfile
          target: prod
          platforms: linux/amd64,linux/arm64
          push: false
          build-args: |
            SITE_DOMAIN=test.local
            API_URL=https://api.test.local
            GA_TRACKING_ID=test
            SENTRY_DSN_FE=test
            ENVIRONMENT=production
            ALLOWED_HOSTS=test.local,localhost,127.0.0.1
            PROJECT_OWNER=test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend runtime smoke image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/frontend/Dockerfile
          target: prod
          platforms: linux/amd64
          load: true
          tags: frontend-smoke:ci
          build-args: |
            SITE_DOMAIN=test.local
            API_URL=https://api.test.local
            GA_TRACKING_ID=test
            SENTRY_DSN_FE=test
            ENVIRONMENT=production
            ALLOWED_HOSTS=test.local,localhost,127.0.0.1
            PROJECT_OWNER=test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test frontend runtime
        run: |
          set -euo pipefail

          docker rm -f frontend-smoke-test >/dev/null 2>&1 || true

          docker run -d \
            --name frontend-smoke-test \
            -p 18080:8080 \
            frontend-smoke:ci

          cleanup() {
            status=$?
            if [[ $status -ne 0 ]]; then
              docker logs frontend-smoke-test || true
            fi
            docker rm -f frontend-smoke-test >/dev/null 2>&1 || true
            exit $status
          }
          trap cleanup EXIT

          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:18080/health >/dev/null; then
              echo "Frontend runtime smoke test passed"
              exit 0
            fi
            sleep 1
          done

          echo "Frontend runtime smoke test failed"
          exit 1

      - name: Build production nginx image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/nginx/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # PR Status Reporting
  pr-status:
    name: PR Status Report
    runs-on: ubuntu-latest
    needs: [frontend, backend, docker-build, security-scan, image-build-check]
    if: always() && github.event_name == 'pull_request'
    permissions:
      issues: write
    steps:
      - name: Report Status
        uses: actions/github-script@v7
        with:
          script: |
            if (context.payload.pull_request?.head?.repo?.fork) {
              core.info('Skipping PR status comment for forked pull request: GITHUB_TOKEN cannot write issue comments in this context.');
              return;
            }

            const results = {
              'Frontend (Lint/Types/Tests)': '${{ needs.frontend.result }}',
              'Backend (Lint/Types/Tests)': '${{ needs.backend.result }}',
              'Docker Dev Build': '${{ needs.docker-build.result }}',
              'Security Analysis': '${{ needs.security-scan.result }}',
              'Production Image Build Check': '${{ needs.image-build-check.result }}'
            };

            const emoji = (s) => s === 'success' ? '✅' : (s === 'failure' ? '❌' : '⏹️');

            let body = `## 🚀 CI/CD Pipeline Results\n\n| Check | Status |\n|---|---|\n`;
            for (const [name, res] of Object.entries(results)) {
              body += `| ${name} | ${emoji(res)} ${res} |\n`;
            }

            const allSuccess = Object.values(results).every(s => s === 'success');
            body += `\n${allSuccess ? '🎉 **All checks passed!**' : '⚠️ **Some checks failed. Please review the logs.**'}`;

            try {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
              });

              const botComment = comments.find(c => c.body.includes('CI/CD Pipeline Results'));

              if (botComment) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: botComment.id,
                  body
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body
                });
              }
            } catch (error) {
              if (error.status === 403) {
                core.warning(`Skipping PR status comment because the GitHub token cannot write comments in this context: ${error.message}`);
                return;
              }
              throw error;
            }
