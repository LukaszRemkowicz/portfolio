name: Version Check

on:
  pull_request:

permissions:
  contents: read

jobs:
  version-check:
    name: Version bump check (dev → main)
    runs-on: ubuntu-latest
    if: github.base_ref == 'main' && github.head_ref == 'dev'
    steps:
      - name: Checkout PR HEAD
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log App Version
        run: |
          if [[ -f VERSION ]]; then
            VER=$(tr -d ' \t\r\n' < VERSION)
            echo "✅ PR introduces VERSION: $VER"
            echo "🏷️  Release tag would be: v$VER"
          else
            echo "⚠️ VERSION file not found"
          fi

      - name: Validate VERSION file and bump
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          VERSION_FILE="VERSION"

          echo "🔎 Version check (dev → main)"
          echo "📌 Base SHA: $BASE_SHA"
          echo "📌 Head SHA: $HEAD_SHA"

          if ! git cat-file -e "${HEAD_SHA}:${VERSION_FILE}" 2>/dev/null; then
            echo "❌ ERROR: ${VERSION_FILE} is missing in PR branch (dev)."
            exit 1
          fi

          NEW="$(git show "${HEAD_SHA}:${VERSION_FILE}" | tr -d ' \t\r\n')"
          if ! [[ "$NEW" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ ERROR: VERSION must be MAJOR.MINOR.PATCH (e.g. 1.0.2). Got: '$NEW'"
            exit 1
          fi

          if ! git cat-file -e "${BASE_SHA}:${VERSION_FILE}" 2>/dev/null; then
            echo "⚠️  Bootstrap: ${VERSION_FILE} does not exist on base branch (main)."
            echo "✅ PR introduces VERSION: $NEW"
            echo "🏷️  Release tag would be: v$NEW"
            exit 0
          fi

          OLD="$(git show "${BASE_SHA}:${VERSION_FILE}" | tr -d ' \t\r\n')"
          if ! [[ "$OLD" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ ERROR: Base VERSION is invalid on main. Got: '$OLD'"
            exit 1
          fi

          echo "🔢 Base version: $OLD"
          echo "🔢 PR version:   $NEW"

          if [[ "$OLD" == "$NEW" ]]; then
            echo "❌ ERROR: VERSION was not changed in this PR (still $NEW)."
            exit 1
          fi

          IFS='.' read -r oldM oldm oldp <<< "$OLD"
          IFS='.' read -r newM newm newp <<< "$NEW"

          if (( newM < oldM )) || \
            (( newM == oldM && newm < oldm )) || \
            (( newM == oldM && newm == oldm && newp <= oldp )); then
            echo "❌ ERROR: VERSION must increase. Base=$OLD PR=$NEW"
            exit 1
          fi

          echo "✅ VERSION bump is valid: $OLD → $NEW"
          echo "🏷️  Release tag would be: v$NEW"
