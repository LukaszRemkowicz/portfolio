name: Publish Production Images

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Temporary manual image tag for branch testing"
        required: true
        type: string

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: lukaszremkowicz/portfolio

jobs:
  publish-production:
    name: Build and push production images
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.image_tag || github.ref_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release tag against VERSION
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          VER="$(tr -d ' \t\r\n' < VERSION)"

          if ! [[ "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([\-+].+)?$ ]]; then
            echo "❌ ERROR: Tag '${TAG}' is not SemVer-like."
            exit 1
          fi

          if [[ "${TAG}" != "v${VER}" ]]; then
            echo "❌ ERROR: Tag '${TAG}' does not match VERSION='${VER}'."
            exit 1
          fi

          echo "✅ Release tag matches VERSION: ${TAG}"

      - name: Use manual image tag for temporary testing
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "⚠️ Temporary manual publish path enabled"
          echo "🏷️ Using manual image tag: ${IMAGE_TAG}"
          # Temporary bypass for branch testing:
          # tag/VERSION validation is intentionally skipped for workflow_dispatch runs.

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata for production backend
        id: meta_backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/production-be
          tags: |
            type=raw,value=${{ env.IMAGE_TAG }}

      - name: Build and push production backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/backend/Dockerfile
          target: production
          push: true
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.meta_backend.outputs.tags }}
          labels: ${{ steps.meta_backend.outputs.labels }}

      - name: Docker metadata for production frontend
        id: meta_frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/production-fe
          tags: |
            type=raw,value=${{ env.IMAGE_TAG }}

      - name: Build and push production frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/frontend/Dockerfile
          target: prod
          push: true
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            SITE_DOMAIN=${{ vars.SITE_DOMAIN }}
            API_URL=https://${{ vars.API_DOMAIN }}
            GA_TRACKING_ID=${{ vars.GA_TRACKING_ID }}
            SENTRY_DSN_FE=${{ secrets.SENTRY_DSN_FE }}
            ENVIRONMENT=production
            ALLOWED_HOSTS=${{ vars.ALLOWED_HOSTS }}
            PROJECT_OWNER=${{ vars.PROJECT_OWNER }}
          tags: ${{ steps.meta_frontend.outputs.tags }}
          labels: ${{ steps.meta_frontend.outputs.labels }}

      - name: Docker metadata for production nginx
        id: meta_nginx
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/production-nginx
          tags: |
            type=raw,value=${{ env.IMAGE_TAG }}

      - name: Build and push production nginx
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/nginx/Dockerfile
          push: true
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.meta_nginx.outputs.tags }}
          labels: ${{ steps.meta_nginx.outputs.labels }}
