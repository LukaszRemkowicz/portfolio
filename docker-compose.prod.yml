networks:
  portfolio_network:


# ---------- Backend Defaults ----------
x-backend-defaults: &backend-defaults
  volumes:
    - prod_media_data:/app/media
    - prod_static_data:/app/staticfiles
  networks:
    - portfolio_network
  environment: &backend-defaults-env
    DEBUG: "False"
    DOCKER_ENV: "true"
    PYTHONPATH: "."
    SECRET_KEY: ${SECRET_KEY}
    DB_NAME: ${DB_NAME}
    DB_USER: ${DB_USER}
    DB_PASSWORD: ${DB_PASSWORD}
    DB_HOST: db
    DB_PORT: 5432
    ADMIN_DOMAIN: ${ADMIN_DOMAIN}
    API_DOMAIN: ${API_DOMAIN}
    CSRF_COOKIE_DOMAIN: ${CSRF_COOKIE_DOMAIN}
    ALLOWED_HOSTS: ${ALLOWED_HOSTS}
    CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS}
    EMAIL_HOST: ${EMAIL_HOST}
    EMAIL_PORT: ${EMAIL_PORT}
    EMAIL_USE_TLS: ${EMAIL_USE_TLS}
    EMAIL_HOST_USER: ${EMAIL_HOST_USER}
    EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD}
    DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL}
    CONTACT_EMAIL: ${CONTACT_EMAIL}
    SESSION_COOKIE_DOMAIN: ${SESSION_COOKIE_DOMAIN}
    SENTRY_DSN: ${SENTRY_DSN}
    ENVIRONMENT: ${ENVIRONMENT:-production}
    SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
    OPENAI_API_KEY: ${OPENAI_API_KEY}
    SKIP_PERMISSION_FIX: ${SKIP_PERMISSION_FIX:-false}
    PROJECT_OWNER: ${PROJECT_OWNER}
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_started


services:
  # ---------- Database ----------
  db:
    image: postgres:15
    restart: always
    networks:
      - portfolio_network
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ---------- Redis ----------
  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - portfolio_network
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---------- Celery Worker ----------
  celery-worker:
    <<: *backend-defaults
    image: portfolio-backend:${TAG}
    restart: always
    command: celery -A settings worker -l info -Q celery,monitoring --concurrency=4
    environment:
      <<: *backend-defaults-env
      MONITORING_LLM_PROVIDER: ${MONITORING_LLM_PROVIDER:-gpt}
      DOCKER_LOGS_DIR: /app/docker-logs
    volumes:
      - prod_media_data:/app/media
      - prod_static_data:/app/staticfiles
      - ${DOCKER_LOGS_DIR}:/app/docker-logs
    healthcheck:
      test: ["CMD-SHELL", "celery -A settings inspect ping -d celery@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---------- Celery Beat ----------
  celery-beat:
    <<: *backend-defaults
    image: production-be:${TAG}
    restart: always
    command: celery -A settings beat -l info -s /app/celerybeat/celerybeat-schedule
    environment:
      <<: *backend-defaults-env
    volumes:
      - prod_media_data:/app/media
      - prod_static_data:/app/staticfiles
      - celerybeat_data:/app/celerybeat

  # ---------- Frontend ----------
  portfolio-fe:
    image: portfolio-frontend:${TAG}
    restart: "always"
    networks:
      - portfolio_network
    environment:
      VITE_GA_TRACKING_ID: ${GA_TRACKING_ID}
      VITE_SENTRY_DSN_FE: ${SENTRY_DSN_FE}
      VITE_ENVIRONMENT: ${ENVIRONMENT:-production}
      VITE_PROJECT_OWNER: ${PROJECT_OWNER}

  # ---------- Backend ----------
  portfolio-be:
    <<: *backend-defaults
    image: portfolio-backend:${TAG}
    restart: always

  # ---------- Release Job ----------
  release:
    <<: *backend-defaults
    image: portfolio-backend:${TAG}
    restart: "no"
    command: >
      sh -c "
        python manage.py migrate --noinput &&
        python manage.py seed_settings &&
        python manage.py collectstatic --noinput
      "

  # ---------- Nginx ----------
  portfolio-nginx:
    image: nginx:1.25
    restart: always
    networks:
      - portfolio_network
    depends_on:
      - portfolio-be
      - portfolio-fe
    environment:
      # Injected by Doppler at runtime — envsubst replaces ${SITE_DOMAIN} in TEMPLATE.conf.template
      SITE_DOMAIN: ${SITE_DOMAIN}
      NGINX_ENVSUBST_OUTPUT_DIR: /etc/nginx
    volumes:
      - ./nginx/prod/TEMPLATE.conf:/etc/nginx/templates/nginx.conf.template:ro
      - ${NGINX_SSL_DIR:-./nginx/ssl/certs}:/etc/nginx/ssl:ro
      - ${NGINX_LOG_DIR:-./nginx/logs}:/var/log/nginx
      - prod_media_data:/app/media:ro
      - prod_static_data:/app/staticfiles:ro
    ports:
      - "80:80"
      - "443:443"


volumes:
  postgres_data:
  prod_media_data:
  prod_static_data:
  celerybeat_data:
