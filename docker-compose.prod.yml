name: portfolio-prod

# ---------- Backend Defaults ----------
x-backend-defaults: &backend-defaults
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"
  volumes:
    - prod_media_data:/app/media
    - prod_static_data:/app/staticfiles
  networks:
    - portfolio_network
  environment: &backend-defaults-env
    DEBUG: "False"
    DOCKER_ENV: "true"
    PYTHONPATH: "."
    SECRET_KEY: ${SECRET_KEY}
    DB_NAME: portfolio_prod
    DB_USER: ${DB_USER}
    DB_PASSWORD: ${DB_PASSWORD}
    DB_HOST: ${DB_HOST:-db}
    DB_PORT: 5432
    ADMIN_DOMAIN: ${ADMIN_DOMAIN}
    API_DOMAIN: ${API_DOMAIN}
    CSRF_COOKIE_DOMAIN: ${CSRF_COOKIE_DOMAIN}
    ALLOWED_HOSTS: ${ALLOWED_HOSTS}
    CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS}
    EMAIL_HOST: ${EMAIL_HOST}
    EMAIL_PORT: ${EMAIL_PORT}
    EMAIL_USE_TLS: ${EMAIL_USE_TLS}
    EMAIL_HOST_USER: ${EMAIL_HOST_USER}
    EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD}
    DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL}
    CONTACT_EMAIL: ${CONTACT_EMAIL}
    SESSION_COOKIE_DOMAIN: ${SESSION_COOKIE_DOMAIN}
    SENTRY_DSN: ${SENTRY_DSN}
    ENVIRONMENT: prod
    MONITORING_LLM_PROVIDER: ${MONITORING_LLM_PROVIDER:-gpt}
    PROJECT_OWNER: ${PROJECT_OWNER}
    REDIS_PASSWORD: ${REDIS_PASSWORD}
    SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
    OPENAI_API_KEY: ${OPENAI_API_KEY}
    SKIP_PERMISSION_FIX: ${SKIP_PERMISSION_FIX:-false}
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_started

networks:
  portfolio_network:
  traefik_proxy:
    external: true

services:
  # ---------- Database ----------
  db:
    image: postgres:18
    restart: always
    networks:
      - portfolio_network
    environment:
      POSTGRES_DB: portfolio_prod
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d portfolio_prod" ]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres18_data:/var/lib/postgresql

  # ---------- Database Backup (Audit 3) ----------
  db-backup:
    image: prodrigestivill/postgres-backup-local:18
    restart: always
    networks:
      - portfolio_network
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: portfolio_prod
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 7
      BACKUP_SUFFIX: ".sql.gz"
    volumes:
      - ${DB_BACKUP_DIR:-/var/backups/portfolio/prod}:/backups
    depends_on:
      db:
        condition: service_healthy

  # ---------- Redis ----------
  redis:
    build:
      context: ./docker/redis
    restart: always
    networks:
      - portfolio_network
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping || redis-cli ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---------- Celery Worker ----------
  celery-worker:
    <<: *backend-defaults
    image: prod-worker:${TAG}
    restart: always
    command: celery -A settings worker -l info -Q celery,monitoring --concurrency=${CELERY_WORKERS:-4}
    environment:
      <<: *backend-defaults-env
      MONITORING_LLM_PROVIDER: ${MONITORING_LLM_PROVIDER:-gpt}
    volumes:
      - prod_media_data:/app/media
      - prod_static_data:/app/staticfiles
      - ${DOCKER_LOGS_DIR:-./logs}:/app/docker-logs
    healthcheck:
      test: ["CMD-SHELL", "celery -A settings inspect ping -d celery@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---------- Celery Beat ----------
  celery-beat:
    <<: *backend-defaults
    image: prod-be:${TAG}
    restart: always
    command: celery -A settings beat -l info -s /app/celerybeat/celerybeat-schedule
    environment:
      <<: *backend-defaults-env
    volumes:
      - prod_media_data:/app/media
      - prod_static_data:/app/staticfiles
      - celerybeat_data:/app/celerybeat

  # ---------- Frontend ----------
  fe:
    image: prod-fe:${TAG}
    restart: "always"
    volumes:
      - frontend_dist:/frontend_dist

  # ---------- Backend ----------
  be:
    <<: *backend-defaults
    image: prod-be:${TAG}
    restart: always
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python3 -c \"import sys, urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5); sys.exit(0)\" >/dev/null 2>&1 || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 3

  # ---------- Release Job ----------
  release:
    <<: *backend-defaults
    image: prod-be:${TAG}
    restart: "no"
    command: >
      sh -c "
        python manage.py migrate --noinput &&
        python manage.py seed_settings &&
        python manage.py collectstatic --noinput
      "

  # ---------- Nginx ----------
  # Service name must be "nginx" — deploy.sh uses: docker compose exec -T nginx nginx -s reload
  nginx:
    image: prod-nginx:${TAG}
    restart: always
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - portfolio_network
      - traefik_proxy
    labels:
      - "traefik.enable=true"
      # Main Site Router
      - "traefik.http.routers.portfolio-prod.rule=Host(`${SITE_DOMAIN}`)"
      - "traefik.http.routers.portfolio-prod.entrypoints=websecure"
      - "traefik.http.routers.portfolio-prod.tls=true"
      - "traefik.http.routers.portfolio-prod.tls.certresolver=letsencrypt"

      # API & Admin Router (Routes to Nginx for X-Accel-Redirect)
      - "traefik.http.routers.portfolio-prod-api.rule=Host(`api.${SITE_DOMAIN}`) || Host(`admin.${SITE_DOMAIN}`)"
      - "traefik.http.routers.portfolio-prod-api.entrypoints=websecure"
      - "traefik.http.routers.portfolio-prod-api.tls=true"
      - "traefik.http.routers.portfolio-prod-api.tls.certresolver=letsencrypt"

      # Middlewares (Security Headers, HSTS, and Rate Limiting)
      - "traefik.http.routers.portfolio-prod.middlewares=public-security@file"
      - "traefik.http.routers.portfolio-prod-api.middlewares=admin-api-security@file,rate-limit@file"

      # Explicit service port (Nginx listens on 80)
      - "traefik.http.services.portfolio-prod.loadbalancer.server.port=80"
    depends_on:
      - be
      - fe
    volumes:
      - ${NGINX_LOG_DIR:-/var/log/portfolio/nginx/prod}:/var/log/nginx
      - prod_media_data:/app/media:ro
      - prod_static_data:/app/staticfiles:ro
      - nginx_blocklist:/etc/nginx/blocklist:ro
      - frontend_dist:/usr/share/nginx/html:ro

volumes:
  postgres18_data:
    name: portfolio_prod_db_data
    external: true
  prod_media_data:
    name: portfolio_prod_media_data
    external: true
  prod_static_data:
    name: portfolio_prod_static_data
    external: true
  celerybeat_data:
    name: portfolio_prod_celerybeat_data
    external: true
  nginx_blocklist:
    name: portfolio_prod_nginx_blocklist
    external: true
  frontend_dist:
    name: portfolio_prod_frontend_dist
    external: true
