api:
  dashboard: true
  insecure: false

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https

  websecure:
    address: ":443"
    http3: {}
  metrics:
    address: ":8082"

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: traefik_proxy
  file:
    filename: /tmp/dynamic_conf.yml
    watch: true

certificatesResolvers:
  letsencrypt:
    acme:
      email: ${CONTACT_EMAIL}
      storage: /letsencrypt/acme.json
      httpChallenge:
        entryPoint: web

log:
  level: INFO
  format: json

accessLog:
  filePath: /var/log/traefik/access.log
  # Flush each request immediately so host-side fail2ban can react in real time.
  bufferingSize: 0
  format: json
  fields:
    defaultMode: keep
    names:
      RequestHost: keep
      RouterName: keep
      ServiceName: keep
      ServiceURL: keep
