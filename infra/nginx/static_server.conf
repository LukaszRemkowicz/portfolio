worker_processes auto;
pid /var/run/nginx.pid;

events {
    worker_connections 8192;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    server_tokens off;

    # Performance Tuning (Audit 4)
    proxy_buffering on;
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    # Max upload size
    client_max_body_size 50M;

    # Rate Limiting Zones
    # - API Zone: 25r/s for modern SPA usage (burst to 50)
    # - Auth Zone: 5r/m for login/reset endpoints
    # - Contact Zone: 5r/m for the contact form (BFF endpoint)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=25r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=contact_limit:10m rate=5r/m;

    # Real IP Trust (Trust all standard private network ranges)
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # 📊 High-Fidelity JSON Analytics (Audit 8)
    log_format json_analytics escape=json
        '{ "time_local": "$time_local", '
        '"remote_addr": "$remote_addr", '
        '"host": "$host", '
        '"upstream_addr": "$upstream_addr", '
        '"request": "$request", '
        '"status": "$status", '
        '"body_bytes_sent": "$body_bytes_sent", '
        '"request_time": "$request_time", '
        '"upstream_response_time": "$upstream_response_time", '
        '"upstream_status": "$upstream_status", '
        '"http_referrer": "$http_referer", '
        '"http_user_agent": "$http_user_agent" }';

    # Keep host-mounted file logs for fail2ban and host-side inspection,
    # but also emit to container stdout/stderr so `docker compose logs nginx`
    # shows live request/error details during production debugging.
    access_log /var/log/nginx/access.log json_analytics;
    access_log /dev/stdout json_analytics;
    error_log /var/log/nginx/error.log warn;
    error_log /dev/stderr warn;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/javascript application/json application/xml image/svg+xml;

    upstream backend_upstream {
        server be:8000;
        keepalive 32;
    }

    upstream frontend_upstream {
        server fe:8080;
        keepalive 16;
    }

    # ⏱️ Global Proxy Timeouts (Audit 3 & 5)
    # Applied at http level to ensure consistency across ALL locations (Auth, API, Media)
    proxy_connect_timeout 5s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Bot blocklist support for production. The downloaded file populates
    # the map with known-bad user agents and targeted probing patterns.
    map $http_user_agent $bad_bot {
        default 0;
        include /etc/nginx/blocklist/blocklist.conf*;
    }

    map $bad_bot:$request_uri $should_block_bot {
        "~^1:.*error\.html" 0;
        "~^1:"              1;
        default             0;
    }

    # Common Proxy Headers Logic
    # 1. Trust X-Forwarded-Proto ONLY from real_ip module
    # 2. If it's empty (internal), use $scheme
    map $http_x_forwarded_proto $proxy_x_forwarded_proto {
        default $http_x_forwarded_proto;
        ''      $scheme;
    }

    map $host $root_redirect_target {
        default "";
        ~^admin\. /admin/;
    }

    server {
        listen 80;
        server_name ~^admin\.;

        if ($should_block_bot) {
            return 403;
        }

        error_page 403 404 500 502 503 504 /error.html;
        location = /error.html {
            root /usr/share/nginx/html;
        }

        proxy_intercept_errors on;

        # 🚫 No-If Bot Blocking (Audit 2)
        # Using a dedicated error page trigger instead of internal 'if'
        error_page 403 /403_bot.html;
        location = /403_bot.html {
            internal;
            return 403 "Action restricted: Bot activity detected.";
        }

        # Block hidden files and directories
        location ~ /\.(?!well-known).* {
            access_log off;
            log_not_found off;
            return 404;
        }

        # Block prohibited extensions and scripts
        location ~ \.(php|py|pl|sh|lua|sql|cgi|bak|old|ini|7z|zip|rar|tar|gz)$ {
            access_log off;
            log_not_found off;
            return 404;
        }

        # Block common CMS and exploit-probing paths
        location ~* /(wp-admin|wp-login|wp-content|xmlrpc\.php|setup\.php|config\.php|eval-stdin\.php) {
            access_log off;
            log_not_found off;
            return 404;
        }

        location /static/ {
            alias /app/staticfiles/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

location ^~ /protected_media/ {
    internal;
    alias /app/media/;
}

        location = /health {
            access_log off;
            return 200 'OK';
        }

        location = /admin/login/ {
            limit_req zone=auth_limit burst=5 nodelay;
            proxy_pass http://backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
            proxy_http_version 1.1;
        }

        location / {
            proxy_pass http://backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
            proxy_http_version 1.1;
        }
    }

    server {
        listen 80 default_server;
        server_name _;

        if ($should_block_bot) {
            return 403;
        }

        error_page 403 404 500 502 503 504 /error.html;
        location = /error.html {
            root /usr/share/nginx/html;
        }

        proxy_intercept_errors on;

        error_page 403 /403_bot.html;
        location = /403_bot.html {
            internal;
            return 403 "Action restricted: Bot activity detected.";
        }

        # Block hidden files and directories
        location ~ /\.(?!well-known).* {
            access_log off;
            log_not_found off;
            return 404;
        }

        # Block prohibited extensions and scripts
        location ~ \.(php|py|pl|sh|lua|sql|cgi|bak|old|ini|7z|zip|rar|tar|gz)$ {
            access_log off;
            log_not_found off;
            return 404;
        }

        # Block common CMS and exploit-probing paths
        location ~* /(wp-admin|wp-login|wp-content|xmlrpc\.php|setup\.php|config\.php|eval-stdin\.php) {
            access_log off;
            log_not_found off;
            return 404;
        }

        location /static/ {
            alias /app/staticfiles/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location ^~ /media/ {
            alias /app/media/;
            expires 30d;
            add_header Cache-Control "public" always;

            location ~ ^/media/(backgrounds|avatars|about_me_images|thumbnails|shop)/ {
                try_files $uri =404;
                allow all;
            }

            deny all;
        }

        location ^~ /protected_media/ {
            internal;
            alias /app/media/;
        }

        location = /sitemap.xml {
            proxy_pass http://backend_upstream/sitemap.xml;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
            proxy_http_version 1.1;
            expires 24h;
            add_header Cache-Control "public, max-age=86400" always;
        }

        location ~ ^/v1/(astroimages(?:/.*)?|categories/?|tags/?|profile/?|background/?|travel-highlights/?|settings/?|images/[^/]+/serve/?)$ {
            limit_req zone=api_limit burst=50 nodelay;
            proxy_pass http://backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
            proxy_http_version 1.1;
        }

        location ~ ^/app/image-files/(.+)$ {
            limit_req zone=api_limit burst=50 nodelay;
            rewrite ^/app/image-files/(.*)$ /image-files/$1 break;
            proxy_pass http://backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
            proxy_http_version 1.1;
        }

        location /admin/ {
            proxy_pass http://backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
            proxy_http_version 1.1;
        }

        location /assets/ {
            proxy_pass http://frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
            expires 1y;
            add_header Cache-Control "public, immutable" always;
        }

        location = /sw.js {
            proxy_pass http://frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Service-Worker-Allowed "/" always;
        }

        location = /service-worker.js {
            proxy_pass http://frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Service-Worker-Allowed "/" always;
        }

        location = /registerSW.js {
            proxy_pass http://frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        }

        location = /manifest.json {
            proxy_pass http://frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        }

        location = /manifest.webmanifest {
            proxy_pass http://frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        }

        location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg|webp|webmanifest)$ {
            proxy_pass http://frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
        }

        location /health {
            access_log off;
            return 200 'OK';
        }

        location = /app/contact {
            limit_req zone=contact_limit burst=2 nodelay;
            proxy_pass http://frontend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
            proxy_http_version 1.1;
        }

        location / {
            proxy_pass http://frontend_upstream;
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_max_temp_file_size 0;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header X-Accel-Buffering "no" always;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
            proxy_http_version 1.1;
        }
    }
}
