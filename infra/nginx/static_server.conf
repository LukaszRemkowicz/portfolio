worker_processes auto;
pid /var/run/nginx.pid;

events {
    worker_connections 8192;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    server_tokens off;

    # Performance Tuning (Audit 4)
    proxy_buffering on;
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    # Max upload size
    client_max_body_size 50M;

    # Rate Limiting Zones
    # - API Zone: 25r/s for modern SPA usage (burst to 50)
    # - Auth Zone: 5r/m for login/reset endpoints
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=25r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;

    # Real IP Trust (Trust all standard private network ranges)
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # 📊 High-Fidelity JSON Analytics (Audit 8)
    log_format json_analytics escape=json
        '{ "time_local": "$time_local", '
        '"remote_addr": "$remote_addr", '
        '"request": "$request", '
        '"status": "$status", '
        '"body_bytes_sent": "$body_bytes_sent", '
        '"request_time": "$request_time", '
        '"upstream_response_time": "$upstream_response_time", '
        '"upstream_status": "$upstream_status", '
        '"http_referrer": "$http_referer", '
        '"http_user_agent": "$http_user_agent" }';

    access_log /var/log/nginx/access.log json_analytics;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/javascript application/json application/xml image/svg+xml;

    upstream backend_upstream {
        server be:8000;
        keepalive 32;
    }

    # ⏱️ Global Proxy Timeouts (Audit 3 & 5)
    # Applied at http level to ensure consistency across ALL locations (Auth, API, Media)
    proxy_connect_timeout 5s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Bot blocklist support for production. The downloaded file populates
    # the map with known-bad user agents and targeted probing patterns.
    map $http_user_agent $bad_bot {
        default 0;
        include /etc/nginx/blocklist/blocklist.conf*;
    }

    map $bad_bot:$request_uri $should_block_bot {
        "~^1:.*error\.html" 0;
        "~^1:"              1;
        default             0;
    }

    # Common Proxy Headers Logic
    # 1. Trust X-Forwarded-Proto ONLY from real_ip module
    # 2. If it's empty (internal), use $scheme
    map $http_x_forwarded_proto $proxy_x_forwarded_proto {
        default $http_x_forwarded_proto;
        ''      $scheme;
    }

    map $host $root_redirect_target {
        default "";
        ~^admin\. /admin/;
    }

    server {
        listen 80;
        server_name _;

        if ($should_block_bot) {
            return 403;
        }

        error_page 403 404 500 502 503 504 /error.html;
        location = /error.html {
            root /usr/share/nginx/html;
        }

        proxy_intercept_errors on;

        # 🚫 No-If Bot Blocking (Audit 2)
        # Using a dedicated error page trigger instead of internal 'if'
        error_page 403 /403_bot.html;
        location = /403_bot.html {
            internal;
            return 403 "Action restricted: Bot activity detected.";
        }

        # Block hidden files and directories
        location ~ /\.(?!well-known).* {
            access_log off;
            log_not_found off;
            return 404;
        }

        # Block prohibited extensions and scripts
        location ~ \.(php|py|pl|sh|lua|sql|cgi|bak|old|ini|7z|zip|rar|tar|gz)$ {
            access_log off;
            log_not_found off;
            return 404;
        }

        # Block common CMS and exploit-probing paths
        location ~* /(wp-admin|wp-login|wp-content|xmlrpc\.php|setup\.php|config\.php|eval-stdin\.php) {
            access_log off;
            log_not_found off;
            return 404;
        }

        # Static assets
        location /static/ {
            alias /app/staticfiles/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Media assets
        # Requirement: Hide /media folder except backgrounds and avatars.
        # ALL other images must be served via X-Accel-Redirect in the backend.
        location /media/ {
            alias /app/media/;
            expires 30d;
            add_header Cache-Control "public";

        # Allow only backgrounds/, avatars/, and generated thumbnails/
            location ~ ^/media/(backgrounds|avatars|thumbnails)/ {
                allow all;
            }

            # Deny everything else in /media/
            deny all;
        }

        # Internal location for X-Accel-Redirect (Photography, Project Images, etc.)
        location /protected_media/ {
            internal;
            alias /app/media/;
        }

        # 1. Hashed assets (Cache for 1y)
        location /assets/ {
            root /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public, immutable" always;
            try_files $uri =404;
        }

        # 2. Never cache HTML entrypoint
        location = /index.html {
            root /usr/share/nginx/html;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            expires 0;
        }

        # 3. Admin host should land on Django admin instead of the SPA shell.
        location = / {
            if ($root_redirect_target != "") {
                return 302 $root_redirect_target;
            }

            root /usr/share/nginx/html;
            try_files /index.html @backend;
        }

        # 4. Default fallback routing (Vite / Backend)
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ @backend;
        }

        # Backend Proxy Definition
        location @backend {
            # Secondary rate limiting at Nginx layer
            limit_req zone=api_limit burst=50 nodelay;

            # ⏱️ X-Accel-Redirect & Streaming Support (Audit 4)
            proxy_buffering off;

            proxy_pass http://backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;

            # Ensure X-Accel-Redirect is handled by Nginx
            proxy_http_version 1.1;
        }

        # 🔐 Strict RATE LIMITING for Auth Endpoints
        location ~ ^/(admin/login/|api/v1/users/login/|api/v1/users/password-reset/) {
            limit_req zone=auth_limit burst=5 nodelay;
            proxy_pass http://backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
            proxy_http_version 1.1;
        }

        # Health check
        location /health {
            access_log off;
            return 200 'OK';
        }

        # 📊 Nginx Metrics (Foundation for Audit 4)
        location /stub_status {
            stub_status;
            # Restrict access to Traefik network ranges
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;
        }
    }
}
