worker_processes auto;
pid /var/run/nginx.pid;

events {
    worker_connections 8192;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    server_tokens off;

    resolver 127.0.0.11 ipv6=off valid=30s;
    resolver_timeout 5s;

    client_max_body_size 50M;

    proxy_connect_timeout 5s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=25r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    map $http_x_forwarded_proto $proxy_x_forwarded_proto {
        default $http_x_forwarded_proto;
        '' $scheme;
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/javascript application/json application/xml image/svg+xml;

    upstream backend_upstream {
        server be:8000;
        keepalive 32;
    }

    upstream frontend_upstream {
        server fe:${FRONTEND_PORT};
        keepalive 16;
    }

    server {
        listen 80;
        listen [::]:80;
        server_name $SITE_DOMAIN;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name $SITE_DOMAIN;

        include /etc/nginx/includes/ssl.conf;
        include /etc/nginx/includes/security_headers.conf;
        include /etc/nginx/includes/error_pages.conf;
        include /etc/nginx/includes/security_locations.conf;

        root /usr/share/nginx/html;

        access_log /var/log/nginx/frontend.access.log;
        error_log /var/log/nginx/frontend.error.log warn;

        location /assets/ {
            proxy_pass http://frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            expires 1y;
            add_header Cache-Control "public, immutable" always;
        }

        location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg|webp|webmanifest)$ {
            proxy_pass http://frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
        }

        location = /sitemap.xml {
            proxy_pass http://backend_upstream/sitemap.xml;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
            expires 24h;
            add_header Cache-Control "public, max-age=86400" always;
        }

        location ^~ /media/ {
            alias /app/media/;
            expires 30d;
            add_header Cache-Control "public" always;

            location ~ ^/media/(backgrounds|avatars|about_me_images|thumbnails)/ {
                try_files $uri =404;
                allow all;
            }

            deny all;
        }

        location /protected_media/ {
            internal;
            alias /app/media/;
        }

        location / {
            proxy_pass http://frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }

    server {
        listen 80;
        listen [::]:80;
        server_name api.$SITE_DOMAIN;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name api.$SITE_DOMAIN;

        include /etc/nginx/includes/ssl.conf;
        include /etc/nginx/includes/security_headers.conf;
        include /etc/nginx/includes/error_pages.conf;
        include /etc/nginx/includes/security_locations.conf;

        access_log /var/log/nginx/api.access.log;
        error_log /var/log/nginx/api.error.log warn;

        location ~ ^/(v1/users/login/|v1/users/password-reset/) {
            limit_req zone=auth_limit burst=5 nodelay;
            proxy_pass http://backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        }

        location ^~ /media/ {
            alias /app/media/;
            expires 30d;
            add_header Cache-Control "public" always;

            location ~ ^/media/(backgrounds|avatars|about_me_images|thumbnails)/ {
                try_files $uri =404;
                allow all;
            }

            deny all;
        }

        location /protected_media/ {
            internal;
            alias /app/media/;
        }

        location / {
            limit_req zone=api_limit burst=50 nodelay;
            proxy_pass http://backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        }
    }

    server {
        listen 80;
        listen [::]:80;
        server_name admin.$SITE_DOMAIN;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name admin.$SITE_DOMAIN;

        include /etc/nginx/includes/ssl.conf;
        include /etc/nginx/includes/security_headers.conf;
        include /etc/nginx/includes/error_pages.conf;
        include /etc/nginx/includes/security_locations.conf;

        access_log /var/log/nginx/admin.access.log;
        error_log /var/log/nginx/admin.error.log warn;

        location = /health {
            access_log off;
            return 200 'OK';
        }

        location = /admin/login/ {
            limit_req zone=auth_limit burst=5 nodelay;
            proxy_pass http://backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        }

        location /static/ {
            alias /app/staticfiles/;
            try_files $uri =404;
            expires 1y;
            add_header Cache-Control "public, immutable" always;
        }

        location ^~ /media/ {
            alias /app/media/;
            expires 30d;
            add_header Cache-Control "public" always;

            location ~ ^/media/(backgrounds|avatars|about_me_images|thumbnails)/ {
                try_files $uri =404;
                allow all;
            }

            deny all;
        }

        location /protected_media/ {
            internal;
            alias /app/media/;
        }

        location / {
            limit_req zone=api_limit burst=50 nodelay;
            proxy_pass http://backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        }
    }
}
