repos:
  # General hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: debug-statements
      - id: check-docstring-first
      - id: requirements-txt-fixer

  # Frontend hooks
  - repo: local
    hooks:
      - id: prettier
        name: prettier
        entry: npx --prefix frontend prettier --write
        language: system
        files: ^frontend/
        types_or: [javascript, jsx, ts, tsx, css, json, yaml, markdown]

  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: npm run lint --prefix frontend
        language: system
        pass_filenames: false
        files: ^frontend/
        types_or: [javascript, jsx, ts, tsx]

  # Backend hooks
  - repo: https://github.com/pycqa/isort
    rev: 7.0.0
    hooks:
      - id: isort
        files: ^backend/
        args:
          ["--settings-path", "backend/pyproject.toml", "--profile", "black"]

  - repo: https://github.com/psf/black
    rev: 26.3.1
    hooks:
      - id: black
        files: ^backend/
        args: ["--config", "backend/pyproject.toml"]
        language_version: python3.13

  - repo: https://github.com/pycqa/flake8
    rev: 7.3.0
    hooks:
      - id: flake8
        files: ^backend/
        exclude: /migrations/
        args: ["--toml-config", "backend/pyproject.toml"]
        additional_dependencies: [flake8-pyproject]

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: bash -c "cd backend && poetry run mypy ."
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: safety
        name: safety
        entry: >-
          bash -c 'cd backend &&
          if [ -z "${SAFETY_API_KEY:-}" ] && command -v security >/dev/null 2>&1; then
            export SAFETY_API_KEY="$(security find-generic-password -a "$USER" -s SAFETY_API_KEY -w 2>/dev/null)";
          fi &&
          if [ -z "${SAFETY_API_KEY:-}" ]; then
            if [ -n "${CI:-}" ]; then
              echo "Skipping safety pre-commit hook in CI because SAFETY_API_KEY is not available; the dedicated security workflow performs the authoritative Safety scan.";
              exit 0;
            fi;
            echo "Set SAFETY_API_KEY in your shell or store it in macOS Keychain as SAFETY_API_KEY before running pre-commit." >&2;
            exit 1;
          fi &&
          poetry run safety --stage cicd scan --target .'
        language: system
        pass_filenames: false
        files: ^backend/(pyproject\.toml|poetry\.lock)$
        always_run: false
        stages: [pre-commit]

  # Testing hooks
  - repo: local
    hooks:
      - id: backend-tests
        name: backend-tests
        entry: bash -c "cd backend && poetry run test"
        language: system
        pass_filenames: false
        files: ^backend/
        always_run: false
        stages: [pre-commit]

      - id: frontend-tests
        name: frontend-tests
        entry: bash -c "cd frontend && npm test -- --watchAll=false"
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
