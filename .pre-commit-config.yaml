repos:
  # General hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: debug-statements
      - id: check-docstring-first

  # Frontend hooks
  - repo: local
    hooks:
      - id: prettier
        name: prettier
        entry: npx --prefix frontend prettier --write
        language: system
        files: ^frontend/
        types_or: [javascript, jsx, ts, tsx, css, json, yaml, markdown]

  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: npm run lint --prefix frontend
        language: system
        pass_filenames: false
        files: ^frontend/
        types_or: [javascript, jsx, ts, tsx]

  # Backend hooks
  - repo: https://github.com/pycqa/isort
    rev: 7.0.0
    hooks:
      - id: isort
        files: ^backend/
        args:
          ["--settings-path", "backend/pyproject.toml", "--profile", "black"]

  - repo: https://github.com/psf/black
    rev: 26.3.1
    hooks:
      - id: black
        files: ^backend/
        args: ["--config", "backend/pyproject.toml"]
        language_version: python3.13

  - repo: https://github.com/pycqa/flake8
    rev: 7.3.0
    hooks:
      - id: flake8
        files: ^backend/
        exclude: /migrations/
        args: ["--toml-config", "backend/pyproject.toml"]
        additional_dependencies: [flake8-pyproject]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      - id: ruff-check
        files: ^backend/
        args: ["--config", "backend/pyproject.toml"]

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: bash -c "cd backend && uv run mypy ."
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: safety
        name: safety
        entry: >-
          bash -c 'cd backend &&
          if [ -z "${SAFETY_API_KEY:-}" ] && [ -x /usr/bin/security ]; then
            export SAFETY_API_KEY="$(/usr/bin/security find-generic-password -s SAFETY_API_KEY -w 2>/dev/null)";
          fi &&
          if [ -z "${SAFETY_API_KEY:-}" ]; then
            echo "SAFETY_API_KEY is required for the safety pre-commit hook. Set it in your shell or store it in macOS Keychain as SAFETY_API_KEY." >&2;
            exit 1;
          fi &&
          project_file=".safety-project.ini" &&
          policy_file=".safety-policy.yml" &&
          project_backup="$(mktemp)" &&
          policy_backup="$(mktemp)" &&
          had_project=0 &&
          had_policy=0 &&
          if [ -f "$project_file" ]; then cp "$project_file" "$project_backup" && had_project=1; fi &&
          if [ -f "$policy_file" ]; then cp "$policy_file" "$policy_backup" && had_policy=1; fi &&
          cleanup() {
            if [ "$had_project" -eq 1 ]; then
              cp "$project_backup" "$project_file";
            else
              rm -f "$project_file";
            fi;
            if [ "$had_policy" -eq 1 ]; then
              cp "$policy_backup" "$policy_file";
            else
              rm -f "$policy_file";
            fi;
            rm -f "$project_backup" "$policy_backup";
          } &&
          trap cleanup EXIT &&
          uv run safety --stage cicd scan --target .'
        language: system
        pass_filenames: false
        files: ^backend/(pyproject\.toml|uv\.lock)$
        always_run: false
        stages: [pre-commit]

  # Testing hooks
  - repo: local
    hooks:
      - id: backend-tests
        name: backend-tests
        entry: bash -c "cd backend && uv run test"
        language: system
        pass_filenames: false
        files: ^backend/
        always_run: false
        stages: [pre-commit]

      - id: frontend-tests
        name: frontend-tests
        entry: bash -c "cd frontend && npm test -- --watchAll=false"
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
