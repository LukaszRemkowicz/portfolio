map $http_user_agent $bad_bot {
    default 0;
    include /etc/nginx/blocklist/blocklist.conf*;
}

server {
    listen 8080;
    server_name _;

    # -------------------------------------------------------------
    # Bot Blocklist
    # -------------------------------------------------------------
    if ($bad_bot) {
        return 403;
    }

    root /usr/share/nginx/html;
    index index.html index.htm;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    set $CSP "default-src 'self'; ";
    set $CSP "${CSP}worker-src 'self' blob:; ";
    set $CSP "${CSP}script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com; ";
    set $CSP "${CSP}style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; ";
    set $CSP "${CSP}font-src 'self' https://fonts.gstatic.com data:; ";
    set $CSP "${CSP}img-src 'self' data: blob: https:; ";
    set $CSP "${CSP}connect-src 'self' https://api.portfolio.local https://*.sentry.io https://www.google-analytics.com; ";
    set $CSP "${CSP}frame-src 'self';";
    add_header Content-Security-Policy $CSP always;

    # -------------------------
    # GLOBAL SECURITY BLOCKS
    # -------------------------
    # Block hidden files and directories (except .well-known)
    location ~ /\.(?!well-known).* {
        access_log off;
        log_not_found off;
        return 301 $scheme://$host/;
    }

    # Block prohibited extensions and scripts
    location ~ \.(php|py|pl|sh|lua|sql|cgi|bak|old|ini|7z|zip|rar|tar|gz)$ {
        access_log off;
        log_not_found off;
        return 301 $scheme://$host/;
    }

    # Block malicious CMS paths probing
    location ~* /(wp-admin|wp-login|wp-content|xmlrpc\.php|setup\.php|config\.php|eval-stdin\.php) {
        access_log off;
        log_not_found off;
        return 301 $scheme://$host/;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Don't cache index.html - ensures users always link to the latest hashed bundles
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires -1;
    }

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml
        application/xml
        text/xml;

    # Cache static assets (hashed bundles can be cached forever)
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg|mp4|webm)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # -------------------------------------------------------------
    # Custom Error Pages Fallback
    # -------------------------------------------------------------
    # Render static custom error design when things break before React
    error_page 404 /error.html;
    error_page 500 502 503 504 /error.html;

    location = /error.html {
        root /usr/share/nginx/html;
        internal;
    }
}
