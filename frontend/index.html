      display: flex;

      justify-content: center;
      align-items: center;
      min-height: 100vh;
      width: 100%;
      box-sizing: border-box;
      overflow: hidden;
      background-image: linear-gradient(rgba(2, 4, 10, 0.8), rgba(2, 4, 10, 0.8)), url(/landscape.webp);
      background-size: cover;
      background-position: center;
    }

      color: var(--celestial-white);
      margin: 0;
      font-family: var(--font-family-primary);
